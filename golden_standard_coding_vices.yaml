- id: VC-021
  title: Cierre prematuro
  symptom: Fallos secundarios quedan vivos
  cause: Alcance de cierre mal definido
  solution: Cerrar cadena completa de defectos revelados
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - prevented
  action: validate_golden_standard_catalogs.py --check-wiki keeps the canonical surfaces,
    link graph, and coverage counts aligned so a partial close fails the gate.
  validating_mechanism: validate_golden_standard_catalogs.py --check-wiki
  downstream_verification: none
  example_lang: python
  example_bad: |
    def fix():
        patch_login()        # arregla el bug principal
        # el log revela ademas un KeyError secundario -> se ignora y se cierra
  example_good: |
    def fix():
        patch_login()
        assert not scan_logs().errors   # cierra la cadena completa de defectos
  detection: |
    Cerrar una tarea cuando los logs/CI aun muestran errores secundarios revelados por el propio fix.
  evidence:
  - source: "arxiv:2603.28592"
    claim: "antipatron recurrente del codigo AI-generado, presente en 80-100% de los proyectos analizados."
