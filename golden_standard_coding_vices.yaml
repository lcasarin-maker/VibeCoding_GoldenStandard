  - id: VC-016
    title: Incomprehensible code
    symptom: Only what was asked for is known
    cause: Absent mental model
    solution: Mandatory explainability
    status: DOC_ONLY
    severity: medium
    tags:
      - vibe-coding
      - doc-only
    action: 'Behavioral/doctrinal vice — not statically falsifiable in a generic way.
      Documented in the Golden Standard catalogs as governance knowledge; no automated
      test can discriminate this without human semantic judgment. Sprint 3.4 triage:
      reclassified from AUDITED/test_behavioral_compliance to DOC_ONLY.'
    validating_mechanism: DOC_ONLY
    downstream_verification: required
    example_lang: python
    example_bad: |
      # High cyclomatic-complexity function, with no docstring or mental model.
      def proc(d):
          r = []
          for k in d:
              if k > 0:
                  for j in d[k]:
                      if j and (j % 2 or k < 3) and not seen(j): r.append(f(j, k))
          return r
    example_good: |
      # Decomposed into named, explainable units; low complexity.
      def proc(d):
          return [transform(j, k) for k, j in relevant_pairs(d)]
    detection: |
      Cyclomatic complexity > threshold (e.g. 10) or long functions without a docstring
      (radon / mccabe / ruff C901).
    evidence:
      - source: "arxiv:2603.28592"
        claim: "recurring anti-pattern of AI-generated code, present in 80-100%
          of the analyzed projects."
    tier: specialist
  - id: VC-017
    title: Stochastic Conversational Optimism without proof
    symptom: Success declarations based solely on superficial aesthetic
      similarity
    cause: Lack of empirical validation at runtime or persistence
    solution: Subordinate approval to real logical traces or observable
      storage deltas
    status: PREVENTED
    severity: high
    tags:
      - vibe-coding
      - prevented
    action: 'Anti-optimism without proof: the test fails if there is no JSON evidence
      in .protocol/evidence/, forcing empirical proof.'
    validating_mechanism: test_B7_evidence_files_are_valid_json
    downstream_verification: none
    example_lang: python
    example_bad: |
      # 'Already fixed' asserted in the chat without running anything.
      # The code ships with a triumphalist comment instead of a test.
      def parse(x):
          return int(x)  # "fix: now handles all cases"
    example_good: |
      # The fix is backed by a test that exercises the claimed case.
      def parse(x):
          return int(x.strip())

      def test_parse_trims():
          assert parse("  42 ") == 42  # evidence, not narrative
    detection: |
      Review heuristic: reject PRs whose only support for 'it works' is prose
      (comments/commit message) without a new test covering the asserted case.
    evidence:
      - source: "arxiv:2603.28592"
        claim: "recurring anti-pattern of AI-generated code, present in 80-100%
          of the analyzed projects."
    tier: extended
