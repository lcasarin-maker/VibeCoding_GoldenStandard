    cause: Ausencia de metacognición activa y falta de interrupciones 
      estructurales.
    solution: '**Chain-Pattern Interrupts (CPI).** Imponer un centinela que cuente
      los intentos fallidos consecutivos de la misma herramienta o script. Si el conteo
      supera el umbral de 2, abortar físicamente la ejecución con `exit 1` y forzar
