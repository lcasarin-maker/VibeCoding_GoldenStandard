  cause: Modelos mentales divergentes al omitir la sincronización previa del filesystem
  solution: Exigir paso obligatorio de reconciliación física contra el ledger antes
    de escribir
  status: PREVENTED
  severity: high
  tags:
  - vibe-coding
  - prevented
  action: 'Dual-session drift: detectado por sync_binding --check (falla si el protocolo
    divergió entre sesiones).'
  validating_mechanism: test_F6_sync_binding_no_protocol_drift
  downstream_verification: none
  example_lang: python
  example_bad: |
    # Dos sesiones/agentes escriben el mismo estado sin coordinacion.
    # La ultima escritura gana y se pierde el trabajo de la otra (lost update).
    state = load_state()
    state["x"] = compute()
    save_state(state)  # sin verificar version: pisa cambios concurrentes
  example_good: |
    # Optimistic locking: la escritura falla si la version cambio entre medias.
    state = load_state()
    base_version = state["version"]
    state["x"] = compute()
    save_state_if_unchanged(state, expected_version=base_version)
  detection: |
    Detectar lectura->modificacion->escritura sobre un estado compartido sin token de
    version, lock, o CAS (compare-and-swap) intermedio.
