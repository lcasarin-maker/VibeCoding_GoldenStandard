- id: VC-016
  title: Código incomprensible
  symptom: Solo se sabe qué se pidió
  cause: Modelo mental ausente
  solution: Explicabilidad obligatoria
  status: DOC_ONLY
  severity: medium
  tags:
  - vibe-coding
  - doc-only
  action: 'Behavioral/doctrinal vice — not statically falsifiable in a generic way.
    Documented in the Golden Standard catalogs as governance knowledge; no automated
    test can discriminate this without human semantic judgment. Sprint 3.4 triage:
    reclassified from AUDITED/test_behavioral_compliance to DOC_ONLY.'
  validating_mechanism: DOC_ONLY
  downstream_verification: required
  example_lang: python
  example_bad: |
    # Funcion de complejidad ciclomatica alta, sin docstring ni modelo mental.
    def proc(d):
        r = []
        for k in d:
            if k > 0:
                for j in d[k]:
                    if j and (j % 2 or k < 3) and not seen(j): r.append(f(j, k))
        return r
  example_good: |
    # Descompuesta en unidades nombradas y explicables; complejidad baja.
    def proc(d):
        return [transform(j, k) for k, j in relevant_pairs(d)]
  detection: |
    Complejidad ciclomatica > umbral (p.ej. 10) o funciones largas sin docstring
    (radon / mccabe / ruff C901).
  evidence:
  - source: "arxiv:2603.28592"
    claim: "antipatron recurrente del codigo AI-generado, presente en 80-100% de los proyectos analizados."
- id: VC-017
  title: Triunfalismo Conversacional Estocástico
  symptom: Declaraciones de éxito basadas únicamente en plausibilidad estética
  cause: Falta de validación empírica en tiempo de ejecución o persistencia
  solution: Subordinar la aprobación a trazas lógicas reales o deltas observables
    de almacenamiento
  status: PREVENTED
  severity: high
  tags:
  - vibe-coding
  - prevented
  action: 'Anti-triunfalismo: el test falla si no hay evidencia JSON en .protocol/evidence/,
    forzando prueba empírica.'
  validating_mechanism: test_B7_evidence_files_are_valid_json
  downstream_verification: none
  example_lang: python
  example_bad: |
    # 'Ya quedo arreglado' afirmado en el chat sin correr nada.
    # El codigo se entrega con un comentario triunfalista en vez de una prueba.
    def parse(x):
        return int(x)  # "fix: ahora maneja todos los casos"
  example_good: |
    # El arreglo se respalda con un test que ejercita el caso reclamado.
    def parse(x):
        return int(x.strip())

    def test_parse_trims():
        assert parse("  42 ") == 42  # evidencia, no narrativa
  detection: |
    Heuristica de revision: rechazar PRs cuyo unico soporte de 'funciona' sea prosa
    (comentarios/commit message) sin test nuevo que cubra el caso afirmado.
  evidence:
  - source: "arxiv:2603.28592"
    claim: "antipatron recurrente del codigo AI-generado, presente en 80-100% de los proyectos analizados."
