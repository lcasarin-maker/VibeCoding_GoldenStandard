  - id: VC-003
    title: Optimism without proof
    symptom: Success is declared without logs
    cause: Confusion between assertion and verification
    solution: Forbid verdicts without observable evidence
    status: PREVENTED
    severity: high
    tags:
      - vibe-coding
      - prevented
    action: 'Anti-optimism without proof: the test fails if there is no JSON evidence
      in .protocol/evidence/, forcing empirical proof.'
    validating_mechanism: test_B7_evidence_files_are_valid_json
    downstream_verification: none
    example_lang: python
    example_bad: |
      # Success is declared without any observable evidence.
      def deploy():
          do_release()
          print("Deploy OK")  # assertion, not verification
    example_good: |
      # The verdict requires evidence: the flow fails if there is no proof.
      def deploy():
          result = do_release()
          assert result.health_check().ok, "deploy without green health-check"
          write_evidence(".protocol/evidence/deploy.json", result.metrics())
    detection: |
      Flag as a vice any path that emits 'OK'/'success'/'done' without an assert over
      observable state or an evidence artifact generated in the same execution.
    evidence:
      - source: "arxiv:2603.28592"
        claim: "recurring anti-pattern of AI-generated code, present in 80-100%
          of the analyzed projects."
    tier: core
