  validating_mechanism: runtime-test
  downstream_verification: none
  example_lang: bash
  example_bad: '# Indiscriminate staging: drags in secrets, artifacts, and untracked junk.

    git add .

    git commit -m "wip"

    '
  example_good: '# Explicit staging of what was changed on purpose; .gitignore covers the rest.

    git add src/feature.py tests/test_feature.py

    git commit -m "feat: add feature with tests"

    '
  detection: 'Pre-commit hook: alert on ''git add .''/''git add -A'' or staging of files that

    match secret/artifact patterns not explicitly listed.

    '
