  - id: VC-121
    title: Critical Redundancies and Repetitive AI-slop Patterns
    symptom: Cumulative additive mutations that scatter the system's
      functionality across multiple redundant files or unnecessary wrappers instead
      of consolidating logic.
    cause: Generative convenience in creating new interfaces instead of
      restructuring the existing ones.
    solution: Impose strict static validation that rejects the existence
      of unregistered wrappers or middlemen that duplicate more than 30% of
      the core functionality.
    example_lang: python
    example_bad: |
      # Instead of using the existing function, the agent creates a redundant wrapper
      # that reimplements the same thing "for convenience". The logic scatters.
      def get_user(id): ...           # already exists

      def fetch_user(id):             # new wrapper: 90% duplicated
          u = get_user(id)
          return u

      def retrieve_user(id):          # yet another, same AI-slop pattern
          return get_user(id)
    example_good: |
      # A single canonical function. If behavior must vary, parameterize.
      def get_user(id, *, with_profile=False): ...
    detection: |
      AST: detect top-level functions whose body delegates >30% to an already
      existing function without added logic (trivial wrappers) or synonymous names
      (`get_`/`fetch_`/`retrieve_`) over the same symbol.
    evidence:
      - source: "GitClear 2025"
        claim: "duplicated/cloned code increased ~8x with AI assistance, a direct
          signal of this anti-pattern at scale."
    status: PREVENTED
    severity: high
    tags:
      - vibe-coding
      - prevented
    action: Duplicate top-level function names across modules detected by
      AST comparison.
    validating_mechanism: test_vc121_duplicate_function_names
    downstream_verification: none
    tier: core
  - id: VC-122
