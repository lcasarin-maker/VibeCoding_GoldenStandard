  test_ref: tool:pytest
- id: VC-052
  title: Zombie Compatibility Theater
  symptom: 'X is ordered to be replaced by Y. The agent creates: inheritance of X in Y, a shim that forwards to Y, a fallback `Y.exists() or X.exists()`, dual sentinels in tests, cross imports "for legacy compatibility". X never dies.'
  cause: The agent interprets "replace" as "add" to avoid going back to fix failures. The "do not break anything" instinct generates dead code disguised as safety.
  solution: '**Replace = Delete + Create. A single source of truth.** When a replacement is ordered: (1) the old file is DELETED from the VCS, (2) the new one does not import from the old one, (3) tests point only to the new one, (4) no alternative paths or dual checks exist. Any "for compatibility" in active code is a sign of an incomplete replacement.'
  status: PREVENTED
  severity: high
  tags:
  - vibe-coding
  - prevented
  action: 'A replacement is a single source of truth: the superseded unit is deleted and the new one carries no inheritance, shim, fallback, or dual test sentinel back to it; static analysis flags compatibility forwarders left in active code.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: "# Dead compat shim: no one uses it but it stays 'just in case'.\ndef legacy_api(*a, **k):\n    return new_api(*a, **k)   # zombie: only forwards, never called\n"
  example_good: "# The shim is removed and the few real callers (if any) are migrated.\n# grep confirms 0 active references -> delete, do not keep.\ndef new_api(...):\n    ...\n"
  detection: 'grep of references: functions/modules marked ''legacy''/''compat''/''deprecated'' with

    0 active callers in the tree = dead candidates to remove.

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: core
  test_ref: tool:ruff
- id: VC-053
  title: Critical Redundancies and Repetitive AI-slop Patterns
  symptom: Cumulative additive mutations that scatter the system's functionality across multiple redundant files or unnecessary wrappers instead of consolidating logic.
  cause: Generative convenience in creating new interfaces instead of restructuring the existing ones.
  solution: Impose strict static validation that rejects the existence of unregistered wrappers or middlemen that duplicate more than 30% of the core functionality. Before adding a new function, verify the stdlib or an already-installed dependency solves it (ponytail review tag — stdlib).
  example_lang: python
  example_bad: "# Instead of using the existing function, the agent creates a redundant wrapper\n# that reimplements the same thing \"for convenience\". The logic scatters.\ndef get_user(id): ...           # already exists\n\ndef fetch_user(id):             # new wrapper: 90% duplicated\n    u = get_user(id)\n    return u\n\ndef retrieve_user(id):          # yet another, same AI-slop pattern\n    return get_user(id)\n"
  example_good: '# A single canonical function. If behavior must vary, parameterize.

    def get_user(id, *, with_profile=False): ...

    '
  detection: 'AST: detect top-level functions whose body delegates >30% to an already

    existing function without added logic (trivial wrappers) or synonymous names

    (`get_`/`fetch_`/`retrieve_`) over the same symbol. Secondary: grep for hand-rolled

    implementations of stdlib primitives (date parsing, base64, JSON merge, retry loops,

    sorting, dedup) — flag with stdlib: tag and name the stdlib replacement.

    '
  evidence:
  - source: GitClear 2025
    claim: duplicated/cloned code increased ~8x with AI assistance, a direct signal of this anti-pattern at scale.
  status: PREVENTED
  severity: high
  tags:
  - vibe-coding
  - prevented
  action: 'Top-level function names must be unique across modules: a structural comparison fails when the same definition name is duplicated, surfacing redundant slop.

    '
  validating_mechanism: runtime-test
  downstream_verification: none
  tier: core
  test_ref: tool:pytest
- id: VC-054
  title: Supply-Chain Contamination via Silent Executions
