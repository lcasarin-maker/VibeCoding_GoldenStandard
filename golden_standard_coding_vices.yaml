  example_good: 'os.remove(temp_file_path)

    '
  detection: Maps sudo commands and accesses to private-key files (.ssh/id_rsa, etc.).
  evidence:
  - source: NVIDIA SkillSpector static_patterns_privilege_escalation.py
    claim: Privilege escalation lets the agent act outside the sandbox.
  tier: extended
  test_ref: tool:ruff
- id: VC-078
  detector: vc078_excessive_agency
  title: Excessive and uncontrolled agency (Excessive Agency / EA1-EA4)
  symptom: The skill makes critical or destructive decisions without human confirmation.
  cause: Lack of human validation (human-in-the-loop) for high-impact actions.
  solution: Restrict autonomous decisions and implement mandatory confirmation.
  status: PREVENTED
  severity: high
  tags:
