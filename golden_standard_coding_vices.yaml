  title: Non-externalized retrospective
  symptom: The session's learning is lost when context is closed or compacted, and the next session repeats already-resolved work.
  cause: Treating the chat as durable memory instead of exporting decisions, findings, and pending items to a persistent ledger.
  solution: Before closing a session with real work, export a structured retrospective with decisions, evidence, and pending items to a stable GS artifact.
  status: PREVENTED
