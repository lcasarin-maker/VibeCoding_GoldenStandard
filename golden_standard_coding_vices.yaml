- id: VC-087
  title: Self-polluting tooling (scratch written into the tracked working tree)
  symptom: Tests, scripts, or hooks leave untracked temp, probe, or backup files inside the working tree; the integrity gate flags them as zombie corruption, producing recurring fake-RED or transient-GREEN gate flips that agents "fix" by deleting the files.
  cause: Scratch is created at repo-relative locations (TemporaryDirectory(dir=<repo>), mkdtemp(dir=<repo>), or probe/backup files written into tracked dirs) and/or cleanup is not guaranteed when a run is interrupted, so residue survives inside the tracked tree.
  solution: 'Scratch must live in the OS temp dir (no dir=<repo>); cleanup runs in finally or a context manager; any unavoidable residue is gitignored. The full suite and tooling must leave `git status --porcelain` empty.'
  status: PREVENTED
  severity: high
  tags:
  - hygiene
  - agent-agnostic
  - prevented-mechanically
  action: 'No scratch in the tracked tree: a test or script that creates temp/probe/backup artifacts at a repo-relative path, or whose run leaves untracked non-ignored files, is rejected. Scratch goes to OS temp with guaranteed cleanup; unavoidable residue is gitignored.'
  validating_mechanism: static-regex
  downstream_verification: none
  example_lang: python
  example_bad: 'with tempfile.TemporaryDirectory(dir=ROOT) as d: ...  # leaks tmpXXXX/ into the repo on interrupted runs'
  example_good: 'with tempfile.TemporaryDirectory() as d: ...  # scratch in OS temp, guaranteed cleanup'
  detection: 'Source under tests/ or scripts/ contains TemporaryDirectory(dir=<repo-root>), mkdtemp(dir=<repo-root>), or tempfile.tempdir set to a repo path; or running the suite leaves new untracked non-ignored files. Verified by test_no_scratch_in_tree in CC.'
  evidence:
  - source: CoderCerberus adversarial audit (internal, cited generically per GS/CC boundary, see Wiki/Evidence)
    claim: A test using TemporaryDirectory(dir=ROOT) leaked tmp*/empty.py into the tree on interrupted runs and flipped the D1 integrity gate to REJECTED; it recurred 3 times because prior sessions deleted the zombies instead of fixing the writer.
  tier: core

  detector: vc087_self_polluting_tooling
  test_ref: scripts/detectors.py::vc087_self_polluting_tooling
- id: VC-088
  title: Execution before plan (planless agent)
  symptom: Agent modifies files without a written step-by-step plan; steps are implicit in chat or agent memory, not in a durable artifact; no checkpoint to validate against and no signal when the task is complete.
  cause: Optimism bias — agent trusts context memory over explicit checkpoints; planning feels like overhead when the task seems obvious; multi-step tasks started as single-step.
  solution: Before any multi-file change, create PLAN.md with numbered steps and explicit acceptance criteria. Execute one step at a time. Delete PLAN.md in the closing commit — its absence is proof of completion. If PLAN.md survives the session, the session is not done.
  action: "Before touching any file in a task with more than one change: (1) create PLAN.md with numbered steps and acceptance criteria; (2) execute one step at a time; (3) validate each step against PLAN.md before proceeding; (4) delete PLAN.md in the closing commit once all steps are done. Absence of PLAN.md after close = evidence of completion."
  status: DOC_ONLY
  severity: high
  validating_mechanism: doctrinal
  doc_only_justification: "Semantic or governance claim requiring contextual/session judgment; no generic repository oracle can distinguish it. Promotion requires a concrete positive fixture, negative fixture, and CI-enforced gate."
  downstream_verification: required
  example_lang: markdown
  example_bad: "# Agent modifies 4 files and runs a migration with no PLAN.md.\n# Steps exist only in chat. Context reset = no recovery path."
  example_good: "# PLAN.md before first file change:\n# Step 1: Create .agents/AGENTS.md [acceptance: file parses, contains §0-§6]\n# Step 2: Migrate BACKLOG.md [acceptance: BACKLOG.md deleted, tasks/backlog/ has N files]\n# Step 3: Delete PLAN.md [acceptance: no PLAN.md in tree]"
  detection: "Multi-file session with no PLAN.md at start. Secondary: PLAN.md present at session close (never cleaned up). Tertiary: plan exists but steps unnumbered or lack acceptance criteria."
  tags:
  - vibe-coding
  - multi-agent
  - process-discipline
  tier: core
  notes: 'DOC_ONLY_PERMANENT: Session-time check. PLAN.md existence at session start cannot be verified statically; audit.py checks PLAN.md structure but not session-scope context.'

- id: VC-089
  title: Addition when deletion suffices
  symptom: Agent adds new code, files, or parameters to solve a problem that removing existing code would have solved
  cause: Generative bias — LLMs are trained to produce tokens, so addition is the default action even when the correct answer is a diff that shrinks
  solution: Before writing any new code, ask whether removing or simplifying existing code solves the problem. Deletion is cheaper, safer, and leaves no new surface to maintain.
  status: DOC_ONLY
  severity: medium
  tags:
  - vibe-coding
  - yagni
  - ponytail
  action: >
    Run the YAGNI check before writing: (1) does this need to exist at all? (2) does removing
    something existing solve it? Shortest working diff wins. Deletion over addition.
    Flag any PR where net line count is positive but the root problem was an unused code path.
  validating_mechanism: DOC_ONLY
  doc_only_justification: "Requires project-specific or human oracle rather than a generic source rule. Promotion requires a concrete positive fixture, negative fixture, and CI-enforced gate."
  downstream_verification: required
  example_lang: python
  example_bad: |
    # Bug: function raises on empty list. Agent adds a guard wrapper.
    def safe_first(lst):
        if not lst: return None
        return first(lst)   # new function wrapping existing one
  example_good: |
    # Fix: the existing function already has the right shape — just call it with a default.
    first(lst, default=None)   # stdlib/existing API; no new function needed
  detection: >
    Heuristic: PR adds >10 lines to fix a bug that a 1-line deletion or stdlib call would resolve.
    Review tag: delete: — what to cut, replacement is nothing or a stdlib call.
  evidence:
  - source: ponytail (DietrichGebert/ponytail)
    claim: benchmark median shows 80-94% line reduction under deletion-first discipline across 5 common tasks.
  tier: core

- id: VC-090
  detector: vc090_premature_abstraction
  title: Premature abstraction (YAGNI interface)
  symptom: Interface, base class, factory, or layer with exactly one implementation; config option nobody sets; parameter accepted but ignored
  cause: Agent anticipates future requirements that were never requested; "what if we need a second one later" reasoning without evidence
  solution: No abstractions unless explicitly requested. Inline the single implementation. Add the abstraction when the second concrete case exists, not before.
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - yagni
  - ponytail
  - prevented
  action: >
    Before creating an interface, abstract class, factory, or plugin system: verify there are
    at least 2 concrete implementations today. One implementation = inline it.
    One config key with one value = hardcode it. One layer with one caller = delete the layer.
  validating_mechanism: static-ast
  downstream_verification: required
  example_lang: python
  example_bad: |
    class AbstractRepository(ABC):        # yagni: one impl today
        @abstractmethod
        def find(self, id): ...

    class PostgresRepository(AbstractRepository):
        def find(self, id): return db.get(id)
  example_good: |
    def find_user(id):
        return db.get(id)   # inline; add abstraction when second backend exists
  detection: >
    AST: abstract classes / Protocol types with exactly one non-abstract subclass in the repo.
    Interfaces exported from a module with a single concrete implementation.
    Config keys present in schema but set to a single value across all environments.
  evidence:
  - source: ponytail (DietrichGebert/ponytail)
    claim: abstraction with one implementation, config nobody sets, layer with one caller — explicit yagni review tag in ponytail-review skill.
  tier: specialist

- id: VC-091
  title: Unnecessary dependency introduction
  symptom: A new package is installed to solve a problem already solvable by stdlib or an already-installed dependency
  cause: Agent reaches for a familiar library without checking what is already available in the environment
  solution: Before adding any dependency, climb the resolution ladder — stdlib first, then already-installed deps, then native platform features. Only if all fail, add a new dep.
  status: DOC_ONLY
  severity: medium
  tags:
  - vibe-coding
  - yagni
  - ponytail
  - dependencies
  action: >
    Resolution ladder before any new dependency: (1) does stdlib cover it? (2) does an already-installed
    package expose this? (3) does a native platform API cover it? Only after all three fail: add dep.
    Every new dep requires explicit justification in the PR why the ladder was exhausted.
  validating_mechanism: DOC_ONLY
  doc_only_justification: "Requires project-specific or human oracle rather than a generic source rule. Promotion requires a concrete positive fixture, negative fixture, and CI-enforced gate."
  downstream_verification: required
  example_lang: python
  example_bad: |
    # requirements.txt gains: python-dateutil
    from dateutil.parser import parse
    dt = parse("2026-06-26")   # stdlib datetime.fromisoformat exists since 3.7
  example_good: |
    from datetime import datetime
    dt = datetime.fromisoformat("2026-06-26")   # stdlib, zero new deps
  detection: >
    Diff scan: any addition to requirements.txt / package.json / pyproject.toml.
    For each new dep, check if stdlib or existing deps expose equivalent functionality.
    native: tag — name the stdlib or installed replacement.
  evidence:
  - source: ponytail (DietrichGebert/ponytail)
    claim: Does an already-installed dependency solve it? Use it. Rung 5 of the YAGNI ladder; new dep only at rung 7.
  tier: specialist
- id: VC-092
  title: Elif chain measured as deep nesting (AST-depth blind spot)
  symptom: A flat, readable if/elif/elif/.../else dispatch is flagged by a nesting-depth
    static check as deeply nested, even though no human reviewer would call it that.
  cause: Python's grammar desugars an if/elif chain into nested ast.If nodes (each elif
    is an If inside the previous one's orelse), so a naive AST-depth counter measures
    an N-branch chain as N levels of nesting, conflating flat alternatives with genuine
    control-flow-inside-control-flow.
  solution: Replace the elif chain with a dispatch dict (name -> callable); same
    behavior, ast.If nesting collapses from N to 1, and the metric now agrees with
    what a human reader already sees.
  status: PREVENTED
  severity: low
  tags:
  - readability
  - static-analysis
  action: >
    When a nesting/complexity static check fires on an if/elif chain, convert it to a
    dispatch dict instead of silencing the check or manually nesting helper functions —
    a mechanical, behavior-preserving fix that satisfies the metric and genuinely
    simplifies the code.
  validating_mechanism: static-ast
  downstream_verification: required
  example_lang: python
  example_bad: |
    def call_tool(self, name, arguments):
        if name == "check":
            ...
        elif name == "sync":
            ...
        elif name == "hygiene":
            ...
        elif name == "knowledge-query":
            ...
        elif name == "adn-coverage":
            ...
        elif name == "graph-context":
            ...
        elif name == "test-impact":
            ...
        else:
            raise KeyError(name)
        # ast.If nesting depth = 7 (one per elif) — a nesting gate set at >4 fires here.
  example_good: |
    def call_tool(self, name, arguments):
        dispatch = {
            "check": lambda: self._capture(self.client.command_check, ...),
            "sync": lambda: self._capture(self.client.command_sync, ...),
            "hygiene": lambda: self._capture(self.client.command_hygiene, ...),
        }
        if name not in dispatch:
            raise KeyError(name)
        return dispatch[name]()
        # ast.If nesting depth = 1.
  detection: >
    AST walk counting nested ast.If/For/While/With/Try/ExceptHandler depth; an elif
    chain of N branches reports depth N. Detected in CoderCerberus's own
    scripts/Full_dimensions_audit.py::_max_ast_nesting (D16 Legibility gate).
  evidence:
  - source: CoderCerberus self-audit (internal, cited generically per GS/CC boundary, see Wiki/Evidence)
    claim: A 7-branch elif dispatch in an MCP tool-call handler was flagged as nesting
      depth 7 by CC's own D16 gate; converting to a dispatch dict resolved the finding
      with zero behavior change.
  tier: specialist
- id: VC-093
  title: 'Unjustified Semgrep suppression (bare # nosemgrep)'
  symptom: 'A line is excluded from a Semgrep rule via `# nosemgrep` or `# nosemgrep:
    rule-id` with no explanation of why the finding is safe to ignore at that specific
    call site.'
  cause: Semgrep flags a real pattern in code the author believes is safe (test fixture,
    trusted constant, already-validated input); suppressing is faster than adding
    a comment, and nothing enforces one.
  solution: Every `# nosemgrep` suppression must carry a written justification on
    the same line explaining why THIS specific instance is safe, not just that the
    rule is noisy in general.
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - prevented
  - semgrep
  action: 'Static source analysis flags a `# nosemgrep`/`# nosemgrep: rule-id` comment
    with nothing after it; the allowed pattern requires trailing justification text
    (e.g. `# nosemgrep: rule-id -- reason`).'
  validating_mechanism: static-ast
  downstream_verification: none
  detector: vc093_unjustified_nosemgrep
  example_lang: python
  example_bad: 'x = eval(user_input)  # nosemgrep: python.lang.security.audit.eval-detected

    '
  example_good: 'x = eval(TRUSTED_CONFIG_LITERAL)  # nosemgrep: python.lang.security.audit.eval-detected
    -- TRUSTED_CONFIG_LITERAL is a hardcoded module constant, never user input

    '
  detection: 'Regex over source text matching `# nosemgrep` or `# nosemgrep: rule-id`,
    requiring non-whitespace text after the pragma on the same line.'
  tier: extended
- id: VC-094
  title: BOM in config file silently kills the first key
  symptom: 'A config file (.env, .yaml, .yml, .json, .toml, .ini) that worked stops
    loading EXACTLY its first variable after being moved, re-saved, or copied. No
    error, no warning: the parser reads the first key with a leading BOM character
    glued to it, so it matches nothing and the loader silently falls back to an empty
    default.'
  cause: A UTF-8 BOM (EF BB BF) at the start of the file, invisible in any editor,
    introduced by Windows tools saving as "UTF-8" (Notepad, PowerShell 5.1's default
    Set-Content -Encoding UTF8). The system assumes the config file is what it appears
    to be; the failure surfaces far from its origin (an empty value at runtime, not
    a parse error).
  solution: Reject a leading BOM in configuration files at write/commit time, and
    make critical loaders (secrets, credentials) fail loudly if an expected first
    key is missing after load -- defense in depth against this whole failure class.
  status: PREVENTED
  severity: high
  tags:
  - vibe-coding
  - prevented
  - configuration
  - encoding
  - silent-failure
  action: 'Static check on configuration files: the first 3 bytes must not be EF BB
    BF (UTF-8 BOM). When writing configs from PowerShell, use New-Object Text.UTF8Encoding($false)
    or Set-Content -Encoding utf8NoBOM (PS7), never the PS5.1 default "UTF8".'
  validating_mechanism: static-regex
  downstream_verification: none
  detector: vc094_bom_in_config
  example_lang: text
  example_bad: "\uFEFFAEQUITAS_SECRET_KEY=abc123\nAEQUITAS_ALGORITHM=HS256\n"
  example_good: 'AEQUITAS_SECRET_KEY=abc123

    AEQUITAS_ALGORITHM=HS256

    '
  detection: Read the first 3 bytes of the file; EF BB BF (decoded as a leading U+FEFF
    in the text form) means the file has a BOM. Applies to .env/.yaml/.yml/.json/.toml/.ini
    and any line-oriented config format.
  evidence:
  - source: Aequitas OS secrets migration to D:\AI\.secrets, Fase 0.3 (internal, cited
      generically per GS/CC boundary, see Wiki/Evidence)
    claim: Moving backend/.env introduced a BOM (via a Windows save path); Settings().SECRET_KEY
      loaded as empty with zero errors or warnings, and the rest of the variables
      loaded fine, which made the misdiagnosis look like an alias/path bug instead
      of an encoding one.
  tier: extended
