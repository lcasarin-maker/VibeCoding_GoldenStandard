    action: "Enforced by scanning privilege escalation indicators in dimensions/d15_agent_security.py."
    validating_mechanism: D15AgentSecurity
    downstream_verification: none
    example_lang: python
    example_bad: |
      os.system("sudo rm -rf /")
    example_good: |
      os.remove(temp_file_path)
    detection: "Mapea comandos sudo y accesos a archivos de llaves privadas (.ssh/id_rsa,
