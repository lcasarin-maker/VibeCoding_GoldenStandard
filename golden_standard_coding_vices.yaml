- id: VC-120
  title: Reasoning Lock-In & AI Runaway loops (Chain-Pattern Interrupts)
  symptom: El agente se obsesiona con un plan de acción defectuoso, repitiendo el
    mismo error o herramienta en un bucle cerrado sin detenerse.
  cause: Ausencia de metacognición activa y falta de interrupciones estructurales.
  solution: '**Chain-Pattern Interrupts (CPI).** Imponer un centinela que cuente los
    intentos fallidos consecutivos de la misma herramienta o script. Si el conteo
    supera el umbral de 2, abortar físicamente la ejecución con `exit 1` y forzar
    un replanteamiento estructural de la solución.'
