- id: VC-003
  title: Triunfalismo sin prueba
  symptom: Se declara éxito sin logs
  cause: Confusión entre afirmación y verificación
  solution: Prohibir veredictos sin evidencia observable
  status: PREVENTED
  severity: high
  tags:
  - vibe-coding
  - prevented
  action: 'Anti-triunfalismo: el test falla si no hay evidencia JSON en .protocol/evidence/,
    forzando prueba empírica.'
  validating_mechanism: test_B7_evidence_files_are_valid_json
  downstream_verification: none
  example_lang: python
  example_bad: |
    # Se declara exito sin ninguna evidencia observable.
    def deploy():
        do_release()
        print("Deploy OK")  # afirmacion, no verificacion
  example_good: |
    # El veredicto exige evidencia: el flujo falla si no hay prueba.
    def deploy():
        result = do_release()
        assert result.health_check().ok, "deploy sin health-check verde"
        write_evidence(".protocol/evidence/deploy.json", result.metrics())
  detection: |
    Marcar como vicio toda ruta que emita 'OK'/'exito'/'done' sin un assert sobre estado
    observable ni artefacto de evidencia generado en la misma ejecucion.
  evidence:
  - source: "arxiv:2603.28592"
    claim: "antipatron recurrente del codigo AI-generado, presente en 80-100% de los proyectos analizados."
