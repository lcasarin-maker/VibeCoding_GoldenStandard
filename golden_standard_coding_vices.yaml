- id: VC-084
  title: Canonical source first (no sink patching)
  symptom: The same truth is corrected in multiple tracked files, or a rendered output is hand-patched instead of regenerated from the canonical source.
  cause: The agent treats derived artifacts as edit targets instead of outputs owned by the source or generator.
  solution: Edit only the canonical source or generator, regenerate all derived artifacts, and verify sink parity before closing. For bug fixes, grep every caller of the touched function and fix the shared function once — one guard at the source is smaller than one per caller, and patching only the reported call-site leaves sibling callers broken.
  status: DOC_ONLY
  severity: high
  tags:
  - governance
  - generated-artifacts
  - source-of-truth
  action: 'Edit the canonical source or its generator first: hand-patching a derived artifact to mask drift is rejected; derived files must be regenerated from source.

    '
  validating_mechanism: DOC_ONLY
  doc_only_justification: "No generic executable oracle is registered for this entry. It remains documentary until a positive fixture, negative fixture, and CI-enforced detector are added; that evidence is the falsifiable promotion trigger to PREVENTED."
  downstream_verification: required
  example_lang: yaml
  example_bad: '# Fixing the rendered wiki directly while leaving the source catalog stale.

    title: "Canonical source first (no sink patching)"

    status: DOC_ONLY

    '
  example_good: '# Fix the source catalog, then regenerate the derived artifacts.

    title: "Canonical source first (no sink patching)"

    status: DOC_ONLY

    '
  detection: "Flags direct edits to generated wiki/report files when the source catalog or generator was not the thing that changed. Also flags bug fixes that patch only the call-site reported in the ticket while grep shows other callers of the same function remain unpatched."
  evidence:
  - source: Golden Standard generation pipeline
    claim: Derived outputs are regenerated from catalog sources, not edited as the source of truth.
  tier: core
  coverage_justification: "Ratchet coverage is falsified by the generated-artifact parity gate: a direct sink edit without its canonical source must produce a non-empty diff and fail CI."
