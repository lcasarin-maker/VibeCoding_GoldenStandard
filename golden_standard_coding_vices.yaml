- id: VC-051
  title: Non-atomic destructive write of critical state
  symptom: A crash or kill during `write_text()` leaves the state file (JSON, YAML) corrupt or empty
  cause: Write atomicity was not modeled as a requirement of the persistence subsystem
  solution: Write to a temporary file in the same directory and rename atomically (`tmp → final`); clean up the temporary if an exception occurs before the rename
  status: PREVENTED
  severity: high
  tags:
  - vibe-coding
  - prevented
  action: 'Writes to critical state must be atomic: state is persisted via a temp-file-plus-atomic-replace path so a crash cannot leave a half-written, corrupted file.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: "# Non-atomic write: if the process dies midway, the critical file corrupts.\nwith open(\"state.json\", \"w\") as f:\n    json.dump(big_state, f)   # truncated and without atomic replacement\n"
  example_good: "# Write to a temp and replace atomically (os.replace is atomic on the same FS).\nimport os, tempfile, json\nfd, tmp = tempfile.mkstemp(dir=\".\")\nwith os.fdopen(fd, \"w\") as f:\n    json.dump(big_state, f)\nos.replace(tmp, \"state.json\")\n"
  detection: 'Detect open(path,''w'')/direct truncation on critical state files without the

    write-temp + atomic os.replace/rename pattern.

    '
  evidence:
