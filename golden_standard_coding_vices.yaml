- id: VC-056
  title: Hasty Deprecation without Analysis (Hasty Deprecation)
  symptom: An agent moves a file to deprecated/ without reading it, without searching for active references, and without verifying whether its functionality is still useful or covered elsewhere.
  cause: The agent treats deprecated/ as a recycle bin instead of an audited quarantine. The "fix the error fast" impulse overrides the required analysis.
  solution: Mandatory process before deprecating — (1) read the full file, (2) search for active references with grep, (3) verify functional duplication, (4) document the decision in DEPRECATION_LOG, (5) THEN run git mv.
  status: PREVENTED
  severity: high
  tags:
  - vibe-coding
  - prevented
  - governance
  action: 'Deprecation requires prior analysis: moving code into a deprecated area is blocked unless a justifying log entry exists, and coverage of that log is verified.

    '
  validating_mechanism: runtime-test
  downstream_verification: none
  example_lang: bash
  example_bad: '# Moves to deprecated/ without reading, without searching references, without justifying.

    git mv module.py deprecated/module.py

    '
  example_good: '# Audited process before deprecating.

    grep -rn "import module" src/        # 1) active references?

    # 2) read the file  3) verify duplication  4) record the decision:

    echo "module.py: no refs, covered by core.py - 2026-06-05" >> DEPRECATION_LOG.md

    git mv module.py deprecated/module.py

    '
  detection: 'Pre-edit guard: reject writes/moves into deprecated/ without a corresponding

    prior entry in DEPRECATION_LOG.md.

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: extended
  test_ref: tool:pytest
