  title: Pánico de Bloqueo y Parcheo Sintáctico Rápido (Lock Panic Shortcut)
  symptom: Ante un fallo inesperado de compilación o de importación en el inicio,
    el agente opta por parchar el síntoma creando shims o duplicando código viejo
    en lugar de investigar y resolver la causa raíz en el control plane o los archivos
    llamadores.
  cause: Priorizar ver el resultado "tests en verde" a corto plazo y a toda costa,
    sacrificando la coherencia y los principios estables de arquitectura del sistema.
  solution: Aplicar estrictamente el Mandato S2 (Brain-First) e investigar la arquitectura
    del control plane para realizar refactorizaciones quirúrgicas de raíz antes de
