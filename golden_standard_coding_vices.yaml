  cause: Lack of explicit preflight, insufficiently closed scope, and the absence of a backlog rule before executing.
  solution: 'Do a preflight before executing: define scope, impacts, and out-of-scope follow-ups; if a new improvement arises after executing, turn it into an explicit backlog item instead of continuing to expand the turn.'
