  - id: VC-121
    title: Redundancias Críticas y Patrones Repetitivos de AI código basura
    symptom: Mutaciones aditivas acumulativas que dispersan la funcionalidad del
      sistema en múltiples archivos redundantes o wrappers innecesarios en vez 
      de consolidar lógica.
    cause: Comodidad generativa al crear nuevas interfaces en lugar de 
      reestructurar las existentes.
    solution: Imponer una validación estática estricta que rechace la existencia
      de wrappers o intermediarios no registrados que dupliquen más del 30% de 
      la funcionalidad core.
    example_lang: python
    example_bad: |
      # En vez de usar la función existente, el agente crea un wrapper redundante
      # que reimplementa lo mismo "por comodidad". La lógica se dispersa.
      def get_user(id): ...           # ya existe

      def fetch_user(id):             # wrapper nuevo: 90% duplicado
          u = get_user(id)
          return u

      def retrieve_user(id):          # otro más, mismo patrón AI slop
          return get_user(id)
    example_good: |
      # Una sola función canónica. Si hace falta variar comportamiento, parametrizar.
      def get_user(id, *, with_profile=False): ...
    detection: |
      AST: detectar funciones top-level cuyo cuerpo delega >30% en otra función ya
      existente sin lógica añadida (wrappers triviales) o nombres sinónimos
      (`get_`/`fetch_`/`retrieve_`) sobre el mismo símbolo.
    evidence:
      - source: "GitClear 2025"
        claim: "el código duplicado/clonado aumentó ~8x con asistencia de IA, señal
          directa de este antipatrón a escala."
    status: PREVENTED
    severity: high
    tags:
      - vibe-coding
      - prevented
    action: Nombres de función top-level duplicados entre módulos detectados por
      comparación AST.
    validating_mechanism: test_vc121_duplicate_function_names
    downstream_verification: none
    tier: core
  - id: VC-122
    title: Contaminación de Cadena de Suministro por Ejecuciones Silenciosas
    symptom: Instalación automática de paquetes arbitrarios o importaciones 
      dinámicas que alteran el entorno sin consentimiento.
    cause: Falta de control preventivo en los hooks de pre-ejecución.
    solution: Bloquear de forma física cualquier comando que intente realizar 
      descargas de paquetes o ejecuciones de urls no declaradas de forma 
      explícita y aprobadas.
    status: PREVENTED
    severity: high
    tags:
      - vibe-coding
      - prevented
    action: pip install automático por subprocess en scripts/ bloqueado por 
      detector + repo-guard de ruta activa.
    validating_mechanism: test_vc122_no_pip_install_in_scripts
    downstream_verification: none
    example_lang: bash
    example_bad: |
      # Ejecuta un script remoto sin fijar ni verificar: el proveedor puede inyectar codigo.
      curl -s https://example.com/install.sh | bash
    example_good: |
      # Descarga, fija por hash y verifica antes de ejecutar.
      curl -sSfL https://example.com/install.sh -o install.sh
      echo "<sha256-conocido>  install.sh" | sha256sum -c -
      bash install.sh
    detection: |
      Detectar patrones 'curl|bash', postinstall scripts no fijados, o ejecucion de
      binarios descargados sin verificacion de hash/firma.
      Tools (CVEs de deps): Trivy (PI-004), OWASP DependencyCheck, Snyk.
    evidence:
      - source: "OWASP Top 10 for Agents 2026"
        claim: "categoria de riesgo reconocida para aplicaciones agenticas (tool misuse
          / unsafe execution)."
    tier: extended
  - id: VC-123
    title: Staging Indiscriminado de Directorios No Trackeados (Unfiltered Git 
      Staging)
    symptom: Comandos de sincronización git automatizados tardan 
      indefinidamente, bloquean el disco (Google Drive virtual mounts) o 
      intentan rastrear miles de archivos temporales/ocultos creados por 
      herramientas externas.
    cause: Uso de `git add -A` o `git add .` sin filtrar ni validar previamente 
      el estado del working tree frente a directorios excluidos o de 
      almacenamiento en la nube virtualizado.
    solution: Preferir `git add -u` para registrar modificaciones en archivos 
      bajo control de versiones y requerir adiciones explícitas quirúrgicas para
      archivos nuevos, asegurando que `.gitignore` esté cargado antes de 
      cualquier invocación del subproceso Git.
    status: PREVENTED
    severity: high
    tags:
      - vibe-coding
      - prevented
    action: git add -A/. (staging indiscriminado) discriminado por detector 
      failing-first (juicio de intención humano).
    validating_mechanism: test_vc123_no_git_add_all_in_scripts
    downstream_verification: none
    example_lang: bash
    example_bad: |
      # Staging indiscriminado: arrastra secretos, artefactos y basura no trackeada.
      git add .
      git commit -m "wip"
    example_good: |
      # Staging explicito de lo que cambio a proposito; .gitignore cubre el resto.
      git add src/feature.py tests/test_feature.py
      git commit -m "feat: add feature with tests"
    detection: |
      Hook pre-commit: alertar ante 'git add .'/'git add -A' o staging de archivos que
      coincidan con patrones de secreto/artefacto no listados explicitamente.
    evidence:
      - source: "arxiv:2603.28592"
        claim: "recurring anti-pattern of AI-generated code, present in 80-100%
          of the analyzed projects."
    tier: extended
  - id: VC-124
    title: Deprecación Precipitada sin Análisis (Hasty Deprecation)
    symptom: Un agente mueve un archivo a deprecated/ sin leerlo, sin buscar 
      referencias activas y sin verificar si su funcionalidad sigue siendo útil 
      o está cubierta en otro lugar.
    cause: El agente trata deprecated/ como papelera de reciclaje en lugar de 
      cuarentena auditada. El impulso de "resolver el error rápido" supera el 
      análisis requerido.
    solution: Proceso obligatorio antes de deprecar — (1) leer el archivo 
      completo, (2) buscar referencias activas con grep, (3) verificar 
      duplicidad funcional, (4) documentar decisión en DEPRECATION_LOG, (5) 
      ENTONCES ejecutar git mv.
    status: PREVENTED
    severity: high
    tags:
      - vibe-coding
      - prevented
      - governance
    action: pre_edit_guard bloquea escrituras en deprecated/ sin entrada previa 
      en DEPRECATION_LOG.md. pre-commit hook valida que archivos staged en 
      deprecated/ estén justificados. D1 del auditor 12D verifica cobertura del 
      log.
    validating_mechanism: check_deprecation_log.py + pre_edit_guard S24 + D1 
      audit
    downstream_verification: none
    example_lang: bash
    example_bad: |
      # Mueve a deprecated/ sin leer, sin buscar referencias, sin justificar.
      git mv module.py deprecated/module.py
    example_good: |
      # Proceso auditado antes de deprecar.
      grep -rn "import module" src/        # 1) referencias activas?
      # 2) leer el archivo  3) verificar duplicidad  4) registrar la decision:
      echo "module.py: sin refs, cubierto por core.py - 2026-06-05" >> DEPRECATION_LOG.md
      git mv module.py deprecated/module.py
    detection: |
      Pre-edit guard: rechazar escrituras/moves hacia deprecated/ sin una entrada previa
      correspondiente en DEPRECATION_LOG.md.
    evidence:
      - source: "arxiv:2603.28592"
        claim: "recurring anti-pattern of AI-generated code, present in 80-100%
          of the analyzed projects."
    tier: extended
  - id: VC-125
    title: Retrospectiva no externalizada
    symptom: El aprendizaje de la sesión se pierde al cerrar contexto o 
      compactar, y la siguiente sesión repite trabajo ya resuelto.
    cause: Tratar el chat como memoria durable en lugar de exportar decisiones, 
      hallazgos y pendientes a un ledger persistente.
    solution: Antes de cerrar una sesión con trabajo real, exportar una 
      retrospectiva estructurada con decisiones, evidencias y pendientes a un 
      artefacto estable del GS.
    status: PREVENTED
    severity: high
    tags:
      - vibe-coding
      - prevented
      - governance
    action: Exigir que toda lección nueva se externalice al catálogo o wiki 
      antes de COMPACT/CLEAR; si no hay exportación estructurada, el cierre 
      queda incompleto.
    validating_mechanism: generate_golden_audit.py + wiki coverage + 
      retrospective export
    downstream_verification: none
    example_lang: python
    example_bad: |
      # El aprendizaje de la sesion vive solo en el chat: se pierde al compactar.
      # (sin artefacto) "ya entendimos que el bug era el lock; la proxima sesion no lo sabra"
    example_good: |
      # Antes de cerrar, exportar la retrospectiva a un ledger estable del repo.
      append_retro("Wiki/Project_Insights/", {
          "decision": "serializar acceso al lock X",
          "evidence": ".protocol/evidence/race.json",
          "todo": "anadir test de concurrencia",
      })
    detection: |
      Cierre de sesion incompleto si hubo trabajo real y no se genero/actualizo un
