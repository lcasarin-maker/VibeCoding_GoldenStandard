  - id: VC-115
    detector: vc115_unsafe_eval
    title: Ejecución dinámica de expresiones externas
    symptom: Motor de reglas ejecuta strings de YAML o config como código Python
      (`eval`/`exec`)
    cause: La fuente de reglas se trata como código confiable sin distinguir 
      datos de instrucciones
    solution: Reemplazar eval con dispatch table de funciones registradas 
      explícitamente; validar nombres en tiempo de carga; rechazar cualquier 
      check no registrado
    status: REMEDIATED
    severity: high
    tags:
      - vibe-coding
      - remediated
    action: Replaced eval-based rules with a pre-registered SAFE_CHECKS dispatch
      table in rules_engine.py to prevent remote code execution.
    validating_mechanism: test_rule_security_rejects_arbitrary_check
    downstream_verification: none
    example_lang: python
    example_bad: |
      # Evaluacion dinamica de una expresion de origen externo: RCE.
      rule = request.args["expr"]
      if eval(rule):          # entrada controlada por el atacante
          grant_access()
    example_good: |
      # Parseo explicito y acotado; nunca eval sobre entrada externa.
      import ast
      rule = request.args["expr"]
      value = ast.literal_eval(rule)   # solo literales, sin ejecucion
      if validate_rule(value):
          grant_access()
    detection: |
      AST: llamadas a eval()/exec()/compile() cuyo argumento proviene (por flujo de datos)
      de entrada externa (request, archivo, red, argv).
      Tools: bandit (Python), semgrep (multi-lenguaje).
    evidence:
      - source: "OWASP Top 10 for Agents 2026"
        claim: "categoria de riesgo reconocida para aplicaciones agenticas (tool misuse
          / unsafe execution)."
    tier: extended
