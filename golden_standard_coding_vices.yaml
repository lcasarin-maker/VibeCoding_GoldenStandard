- id: VC-055
  title: Indiscriminate Staging of Untracked Directories (Unfiltered Git Staging)
  symptom: Automated git synchronization commands take indefinitely long, lock the disk (Google Drive virtual mounts), or try to track thousands of temporary/hidden files created by external tools.
  cause: Use of `git add -A` or `git add .` without filtering or previously validating the working-tree state against excluded directories or virtualized cloud storage.
  solution: Prefer `git add -u` to record modifications to files under version control and require surgical explicit additions for new files, ensuring that `.gitignore` is loaded before any Git subprocess invocation.
  status: PREVENTED
  severity: high
  tags:
  - vibe-coding
  - prevented
  action: 'Staging must be deliberate: indiscriminate staging of all untracked files is rejected, requiring explicit human intent about what enters a commit.

