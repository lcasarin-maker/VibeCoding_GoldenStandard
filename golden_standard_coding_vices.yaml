  - id: VC-117
    title: Escritura destructiva no atómica de estado crítico
    symptom: Un crash o kill durante `write_text()` deja el archivo de estado 
      (JSON, YAML) corrupto o vacío
    cause: La atomicidad de escritura no se modeló como requisito del subsistema
      de persistencia
    solution: Escribir a archivo temporal en el mismo directorio y renombrar 
      atómicamente (`tmp → final`); limpiar el temporal si ocurre una excepción 
      antes del rename
    status: REMEDIATED
    severity: high
    tags:
      - vibe-coding
      - remediated
    action: Atomic state writes via core_utils.write_json_atomic (tempfile + 
      os.replace + fsync), wired into update_lock_state and 
      ProtocolSyncManager._save_state.
    validating_mechanism: test_critical_state_write_is_atomic
    downstream_verification: none
    example_lang: python
    example_bad: |
      # Escritura no atomica: si el proceso muere a mitad, el archivo critico se corrompe.
      with open("state.json", "w") as f:
          json.dump(big_state, f)   # truncado y sin reemplazo atomico
    example_good: |
      # Escribe a temporal y reemplaza atomicamente (os.replace es atomico en el mismo FS).
      import os, tempfile, json
      fd, tmp = tempfile.mkstemp(dir=".")
      with os.fdopen(fd, "w") as f:
          json.dump(big_state, f)
      os.replace(tmp, "state.json")
    detection: |
      Detectar open(path,'w')/truncado directo sobre archivos de estado critico sin patron
      write-temp + os.replace/rename atomico.
    evidence:
      - source: "arxiv:2603.28592"
        claim: "recurring anti-pattern of AI-generated code, present in 80-100%
          of the analyzed projects."
    tier: extended
  - id: VC-118
    title: Teatro de Compatibilidad inactivoe
    symptom: 'Se ordena reemplazar X por Y. El agente crea: herencia de X en Y, shim
      que reenvía a Y, fallback `Y.exists() or X.exists()`, centinelas duales en tests,
      imports cruzados "por retrocompatibilidad". X nunca muere.'
    cause: El agente interpreta "reemplazar" como "añadir" para evitar regresar 
      a corregir fallos. El instinto de "no romper nada" genera código muerto 
      disfrazado de seguridad.
    solution: '**Reemplazar = Eliminar + Crear. Una sola fuente de verdad.** Cuando
      se ordena reemplazar: (1) el archivo viejo se ELIMINA del VCS, (2) el nuevo
      no importa del viejo, (3) los tests apuntan solo al nuevo, (4) no existen rutas
      alternativas ni checks duales. Cualquier "por compatibilidad" en código activo
      es señal de reemplazo incompleto.'
    status: PREVENTED
    severity: high
    tags:
      - vibe-coding
      - prevented
    action: Prevented by D1 _audit_d1_inactivoe_compat scanning active scripts 
      for inactivoe compatibility shim patterns.
    validating_mechanism: D1Integrity
    downstream_verification: none
    example_lang: python
    example_bad: |
      # Shim de compatibilidad muerto: nadie lo usa pero sigue 'por si acaso'.
      def legacy_api(*a, **k):
          return new_api(*a, **k)   # zombie: solo reenvia, jamas se llama
    example_good: |
      # Se elimina el shim y se migran los pocos llamadores reales (si los hay).
      # grep confirma 0 referencias activas -> borrar, no conservar.
      def new_api(...):
          ...
    detection: |
      grep de referencias: funciones/modulos marcados 'legacy'/'compat'/'deprecated' con
      0 llamadores activos en el arbol = candidatos inactivoe a eliminar.
    evidence:
      - source: "arxiv:2603.28592"
        claim: "recurring anti-pattern of AI-generated code, present in 80-100%
          of the analyzed projects."
    tier: core
