format_version: 3.0.0
catalog_name: coding_vices
items:
- id: VC-001
  title: Optimism without proof
  symptom: Success is declared without logs
  cause: Confusion between assertion and verification
  solution: Forbid verdicts without observable evidence
  status: PREVENTED
  severity: high
  tags:
  - vibe-coding
  - prevented
  action: 'Empirical proof is required before declaring success: closure fails when no structured evidence artifact backs the claim, forcing verification over optimism.

    '
  validating_mechanism: runtime-test
  downstream_verification: none
  example_lang: python
  example_bad: "# Success is declared without any observable evidence.\ndef deploy():\n    do_release()\n    print(\"Deploy OK\")  # assertion, not verification\n"
  example_good: "# The verdict requires evidence: the flow fails if there is no proof.\ndef deploy():\n    result = do_release()\n    assert result.health_check().ok, \"deploy without green health-check\"\n    write_evidence(\".protocol/evidence/deploy.json\", result.metrics())\n"
  detection: 'Flag as a vice any path that emits ''OK''/''success''/''done'' without an assert over

    observable state or an evidence artifact generated in the same execution.

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: core
  test_ref: tool:pytest
- id: VC-002
  detector: vc005_untracked_prototype
  title: Prototype turned into debt
  symptom: The temporary becomes permanent
  cause: Lack of an expiration boundary
  solution: Every prototype must have a date, owner, and exit
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - doc-only
  action: 'Static detector `vc005_untracked_prototype` flags TODO/FIXME/HACK/prototype comments that lack owner, expiration, and ticket metadata.'
  validating_mechanism: static-regex
  downstream_verification: required
  example_lang: python
  example_bad: "# \"Temporary\" prototype with no date or owner: it stays forever.\ndef quick_hack():            # TODO: temporary, remove\n    return cached_guess()\n"
  example_good: "# Every prototype carries explicit, trackable expiration and owner.\ndef quick_hack():            # PROTOTYPE owner=luis expires=2026-07-01 ticket=BUG-12\n    return cached_guess()\n"
  detection: 'Flag TODO/FIXME/HACK/''temporary''/''prototype'' comments without a parseable owner +

    expiration date + ticket.

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: specialist
  test_ref: scripts/detectors.py::vc005_untracked_prototype
  rationalizations:
  - excuse: It's just a prototype, I'll clean it up later.
    rebuttal: 'There is no separate "later" queue: an untracked prototype has no owner,
      no expiration, and no ticket, so "later" never arrives (that''s the vice itself,
      not an exception to it). Add owner+expires+ticket now or it silently becomes
      permanent debt.'
  - excuse: It's too small to bother tracking.
    rebuttal: Size doesn't determine whether debt compounds; the absence of an
      expiration boundary does. A one-line hack with no exit date is exactly
      what vc005_untracked_prototype exists to catch.
- id: VC-003
  detector: vc003_incomprehensible_code
  title: Incomprehensible code
  symptom: Only what was asked for is known
  cause: Absent mental model
  solution: Mandatory explainability
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - doc-only
  action: 'Static detector `vc003_incomprehensible_code` flags functions that are structurally complex and missing a docstring.'
  validating_mechanism: static-ast
  downstream_verification: required
  example_lang: python
  example_bad: "# High cyclomatic-complexity function, with no docstring or mental model.\ndef proc(d):\n    r = []\n    for k in d:\n        if k > 0:\n            for j in d[k]:\n                if j and (j % 2 or k < 3) and not seen(j): r.append(f(j, k))\n    return r\n"
  example_good: "# Decomposed into named, explainable units; low complexity.\ndef proc(d):\n    return [transform(j, k) for k, j in relevant_pairs(d)]\n"
  detection: 'Cyclomatic complexity > threshold (e.g. 10) or long functions without a docstring

    (radon / mccabe / ruff C901).

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: specialist
  test_ref: scripts/detectors.py::vc003_incomprehensible_code
- id: VC-004
  title: Stochastic Conversational Optimism without proof
  symptom: Success declarations based solely on superficial aesthetic similarity
  cause: Lack of empirical validation at runtime or persistence
  solution: Subordinate approval to real logical traces or observable storage deltas
  status: PREVENTED
  severity: high
  tags:
  - vibe-coding
  - prevented
  action: 'Empirical proof is required before declaring success: closure fails when no structured evidence artifact backs the claim, forcing verification over optimism.

    '
  validating_mechanism: runtime-test
  downstream_verification: none
  example_lang: python
  example_bad: "# 'Already fixed' asserted in the chat without running anything.\n# The code ships with a triumphalist comment instead of a test.\ndef parse(x):\n    return int(x)  # \"fix: now handles all cases\"\n"
  example_good: "# The fix is backed by a test that exercises the claimed case.\ndef parse(x):\n    return int(x.strip())\n\ndef test_parse_trims():\n    assert parse(\"  42 \") == 42  # evidence, not narrative\n"
  detection: 'Review heuristic: reject PRs whose only support for ''it works'' is prose

    (comments/commit message) without a new test covering the asserted case.

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: extended
  test_ref: tool:pytest
- id: VC-005
  detector: vc005_premature_closure
  title: Premature closure
  symptom: Secondary failures stay alive
  cause: Poorly defined closure scope
  solution: Close the full chain of revealed defects
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - prevented
  action: 'Static detector `vc005_premature_closure` flags closures that ignore still-visible secondary failures.'
  validating_mechanism: static-regex
  downstream_verification: none
  example_lang: python
  example_bad: "def fix():\n    patch_login()        # fixes the main bug\n    # the log also reveals a secondary KeyError -> ignored and closed\n"
  example_good: "def fix():\n    patch_login()\n    assert not scan_logs().errors   # closes the full chain of defects\n"
  detection: 'Closing a task while the logs/CI still show secondary errors revealed by the fix itself.

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: extended
  test_ref: scripts/detectors.py::vc005_premature_closure
- id: VC-006
  title: Non-externalized plan
  symptom: Work lives in the chat
  cause: Ephemeral state
  solution: Keep a stable physical or logical plan
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - prevented
  action: 'The plan must be externalized: topology validation requires the inbox surface to be published, linked from the home page, and backed by an ingestion protocol and templates.

    '
  validating_mechanism: runtime-test
  downstream_verification: none
  example_lang: text
  example_bad: '# The 6-step plan lives only in the chat; on compaction it is lost.

    '
  example_good: '# Versioned Sprint Document (e.g., PLAN.md): steps, status, and done-criteria outside the chat.

    '
  detection: "Multi-step work without a persistent plan artifact (e.g., Sprint Document / PLAN.md / issue) \noutside the chat.\n"
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: extended
  test_ref: tool:pytest
- id: VC-007
  title: Non-surgical scope
  symptom: Enormous, unsafe changes
  cause: Excessive impact surface
  solution: Limit changes to testable units
  status: DOC_ONLY
  severity: medium
  tags:
  - vibe-coding
  - doc-only
  action: 'Behavioral/doctrinal vice — not statically falsifiable in a generic way. Documented in the Golden Standard catalogs as governance knowledge; no automated test can discriminate this without human semantic judgment. Sprint 3.4 triage: reclassified from legacy review/test_behavioral_compliance to DOC_ONLY.'
  validating_mechanism: DOC_ONLY
  doc_only_justification: "Requires project-specific or human oracle rather than a generic source rule. Promotion requires a concrete positive fixture, negative fixture, and CI-enforced gate."
  downstream_verification: required
  example_lang: text
  example_bad: '# A single commit touches 47 files and 1,800 lines for a 1-feature change.

    '
  example_good: '# Change scoped to a testable unit: 1-3 files, reviewable diff.

    '
  detection: 'Commits/PRs that exceed diff thresholds (files touched or lines) for a change

    that should be atomic.

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: specialist
  notes: 'DOC_ONLY_PERMANENT: Commit scope judgment requires diff heuristics + human PR review. False-positive rate prohibits automation.'
- id: VC-008
  title: State drift
  symptom: Large edits degrade coherence
  cause: Scattered mutation
  solution: Control scope and checkpoints
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - prevented
  action: 'Generated surfaces must track their source: regenerating audit artifacts and re-checking topology prevents home, graph, and index pages from drifting away from the catalogs.

    '
  validating_mechanism: runtime-test
  downstream_verification: none
  example_lang: text
  example_bad: '# Successive massive edits without a checkpoint -> real state diverges from expected.

    '
  example_good: '# Verifiable slices + checkpoint (git commit) between edits.

    '
  detection: 'Series of large edits without intermediate commits/checkpoints that allow resuming.

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: extended
  test_ref: tool:pytest
- id: VC-009
  title: Full rewrite
  symptom: Prior integrity is lost
  cause: Non-reversible operation
  solution: Prefer minimal diffs
  status: DOC_ONLY
  severity: medium
  tags:
  - vibe-coding
  - doc-only
  action: 'Full rewrite vs surgical edit: behavioral judgment vice (when a rewrite is justified). No static test discriminates intent, so this stays a manual-review DOC_ONLY entry.'
  validating_mechanism: DOC_ONLY
  doc_only_justification: "Requires project-specific or human oracle rather than a generic source rule. Promotion requires a concrete positive fixture, negative fixture, and CI-enforced gate."
  downstream_verification: required
  example_lang: text
  example_bad: '# The agent rewrites the whole file to change two lines.

    # diff: 198 deletions(-), 200 insertions(+)  -> history and invariants are lost

    '
  example_good: '# Minimal, surgical diff: only what changes.

    - timeout = 30

    + timeout = 60

    '
  detection: 'Diff heuristic: changes where >80% of an existing file''s lines are

    deleted and reinserted = total rewrite disguised as an edit.

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: specialist
  notes: 'DOC_ONLY_PERMANENT: Full-rewrite detection (diff >80%) is unreliable; rewrites are sometimes correct. Human judgment required at PR review.'
- id: VC-010
  detector: vc036_destructive_without_dryrun
  title: No dry run
  symptom: A destructive action runs directly
  cause: Lack of simulation
  solution: Simulate before applying
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - doc-only
  action: 'Static detector `vc036_destructive_without_dryrun` flags destructive operations that appear without a dry-run or simulation step in the same flow.'
  validating_mechanism: static-regex
  downstream_verification: required
  example_lang: bash
  example_bad: '# Mass deletion run directly, without simulating.

    find . -name "*.tmp" -delete

    '
  example_good: '# Simulate first; apply only after reviewing the list.

    find . -name "*.tmp" -print     # dry-run: what would be deleted

    find . -name "*.tmp" -delete    # apply after confirming

    '
  detection: 'Destructive operations (rm/-delete/DROP/TRUNCATE/git reset --hard) without a prior

    simulation step (--dry-run/-print/EXPLAIN) in the same flow.

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: specialist
  test_ref: scripts/detectors.py::vc036_destructive_without_dryrun
- id: VC-011
  title: Blind regeneration
  symptom: Code is replaced without diagnosis
  cause: Erasure of causality
  solution: Diagnosis before generation
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - prevented
  action: 'Regeneration must precede validation: a fresh rebuild of the vault is forced before checks, so blind replacement cannot masquerade as a finished state.

    '
  validating_mechanism: runtime-test
  downstream_verification: none
  example_lang: python
  example_bad: '# The whole function is replaced without diagnosing why it failed.

    def parse(x): return brand_new_impl(x)   # ''regenerate until it passes''

    '
  example_good: '# Diagnose first: reproduce, isolate cause, fix minimally.

    def parse(x): return x.strip() or DEFAULT   # fix aimed at the cause

    '
  detection: 'Total replacement of a failing unit without evidence of prior diagnosis (repro/cause).

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: extended
  test_ref: tool:pytest
- id: VC-012
  title: Invisible debt
  symptom: Unrecorded shortcuts
  cause: Hidden future cost
  solution: Declare technical debt
  status: REMEDIATED
  severity: medium
  tags:
  - vibe-coding
  - doc-only
  action: 'Behavioral/doctrinal vice — not statically falsifiable in a generic way. Documented in the Golden Standard catalogs as governance knowledge; no automated test can discriminate this without human semantic judgment. Sprint 3.4 triage: reclassified from legacy review/test_behavioral_compliance to DOC_ONLY.'
  validating_mechanism: static-regex
  downstream_verification: required
  example_lang: python
  example_bad: "def pay(x):\n    return charge(x)   # shortcut: no idempotency or retries (unrecorded)\n"
  example_good: "# The debt is declared explicitly in a trackable register.\ndef pay(x):\n    return charge(x)   # DEBT-21: missing idempotency, see TECH_DEBT.md\n"
  detection: 'Known shortcuts (''for now'', no validation, no retry) without a corresponding

    entry in a technical-debt register.

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: specialist
  notes: Promoted 2026-06-22. static-regex detector for shortcut/for-now comment patterns added to scripts/detectors.py.
  detector: vc012_invisible_debt
  test_ref: scripts/detectors.py::vc012_invisible_debt
- id: VC-013
  detector: vc013_ambiguous_handoff
  title: Ambiguous handoff
  symptom: The next actor does not know state, risk, or next step
  cause: Incomplete state transfer
  solution: Structured handoff with goal, evidence, and blockers
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - doc-only
  action: 'Static detector `vc013_ambiguous_handoff` flags handoff notes that omit goal/state/evidence/blockers/next.'
  validating_mechanism: static-regex
  downstream_verification: required
  example_lang: text
  example_bad: '# Handoff without the minimal fields.

    "continue where we left off"

    '
  example_good: '# Structured, verifiable handoff.

    goal: X | state: Y | evidence: .protocol/... | blockers: Z | next: W

    '
  detection: 'A handoff/STATUS document that does not contain the required sections (goal,

    state, evidence, blockers, next action).

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: specialist
  test_ref: scripts/detectors.py::vc013_ambiguous_handoff
- id: VC-014
  title: Monolithic memory
  symptom: All context is mixed together
  cause: Lack of stratification
  solution: Separate core, active, patterns, and history
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - prevented
  action: 'Knowledge must be modular: topology validation requires separate canonical surfaces for vices, tokenomics, insights, and the graph rather than one monolithic page.

    '
  validating_mechanism: runtime-test
  downstream_verification: none
  example_lang: text
  example_bad: '# A single CONTEXT.md mixes core, active state, patterns, and history.

    '
  example_good: '# Separated by lifespan: CORE.md (immutable), STATUS.md (active), PATTERNS.md, HISTORY.md.

    '
  detection: 'A single memory file that mixes layers with different lifespans (stable vs volatile).

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: extended
  test_ref: tool:pytest
- id: VC-015
  title: Hallucinated integration
  symptom: Invented dependencies
  cause: External world assumed
  solution: Verify real integrations
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - prevented
  action: 'The agent imports or references a package, API, or module that does not exist

    in the declared dependency manifest or in the public package registry.

    '
  validating_mechanism: static-ast
  downstream_verification: required
  example_lang: python
  example_bad: '# Importing a package that does not exist in requirements.txt or PyPI.

    import foobar_ai_sync  # hallucinated package name

    result = foobar_ai_sync.process(data)

    '
  example_good: '# Only import packages that are declared in the dependency manifest.

    import requests  # listed in requirements.txt

    response = requests.get(url)

    '
  detection: 'AST: parse top-level imports and compare them against the dependency manifest

    (requirements.txt, pyproject.toml, package-lock.json). Flag imports that resolve

    to packages absent from the manifest. Also: check PyPI existence for new imports.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: AI agents generate non-existent package names (slopsquatting) in measurable ways.
  tier: specialist
  test_ref: tool:ruff
- id: VC-016
  detector: vc016_broken_version_parity
  title: Broken version parity
  symptom: Docs, runners, and state declare different versions
  cause: Inconsistent distributed identity
  solution: One canonical version, derived not copied
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - doc-only
  action: 'Static detector `vc016_broken_version_parity` flags multiple distinct version literals on the same surface.'
  validating_mechanism: static-regex
  downstream_verification: required
  example_lang: text
  example_bad: '# Three sources declare different versions.

    pyproject.toml : version = "1.4.0"

    __init__.py    : __version__ = "1.2.0"

    CHANGELOG.md   : ## 1.5.0

    '
  example_good: '# A single canonical source; the rest derive it, not copy it.

    __version__ = importlib.metadata.version("mypkg")

    '
  detection: 'Extract all version strings from the repo (manifest, __version__, changelog,

    tags) and fail if they do not match.

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: specialist
  test_ref: scripts/detectors.py::vc016_broken_version_parity
- id: VC-017
  detector: vc017_deadlock_without_heartbeat
  title: Deadlock without a heartbeat
  symptom: A process stays blocked undetected
  cause: Lack of a liveness signal
  solution: Require a heartbeat, timeout, and recovery policy
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - doc-only
  action: 'Static detector `vc017_deadlock_without_heartbeat` flags blocking calls that appear without timeout or heartbeat support.'
  validating_mechanism: static-regex
  downstream_verification: required
  example_lang: python
  example_bad: 'resp = sock.recv(1024)        # no timeout: if the peer dies, it hangs forever

    '
  example_good: 'sock.settimeout(30)

    resp = sock.recv(1024)        # timeout + retry/recovery policy

    '
  detection: 'Blocking calls (recv/lock.acquire/join/await) without a configured timeout or

    heartbeat.

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: specialist
  test_ref: scripts/detectors.py::vc017_deadlock_without_heartbeat
- id: VC-018
  detector: vc061_constant_stub
  title: Stub as architecture
  symptom: A temporary simulation becomes a dependency
  cause: Substitute confused with component
  solution: Remove stubs before validating integration
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - doc-only
  action: 'Static detector `vc061_constant_stub` flags production functions or classes whose body collapses to a stub such as pass, ellipsis, or a constant return.'
  validating_mechanism: static-ast
  downstream_verification: required
  example_lang: python
  example_bad: "# A temporary stub stays wired as a real production dependency.\nclass PaymentGateway:\n    def charge(self, amount):\n        return True        # stub: \"we'll connect it later\"\n"
  example_good: "# The stub lives only in tests; production uses the real implementation.\nclass PaymentGateway:\n    def charge(self, amount):\n        return self._provider.charge(amount)\n"
  detection: 'Classes/functions with a trivial body (return True/None/pass) imported from production

    modules (not from tests/fixtures).

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: specialist
  test_ref: scripts/detectors.py::vc061_constant_stub
- id: VC-019
  title: State Concurrency Drift (Dual-Session Drift)
  symptom: Loss of commits and regressions from parallel overwrites
  cause: Divergent mental models from skipping prior filesystem synchronization
  solution: Require a mandatory physical reconciliation step against the ledger before writing
  status: PREVENTED
  severity: high
  tags:
  - vibe-coding
  - prevented
  action: 'State must stay consistent across concurrent sessions: a parity check fails when the protocol fingerprint diverges between two sessions.

    '
  validating_mechanism: runtime-test
  downstream_verification: none
  example_lang: python
  example_bad: '# Two sessions/agents write the same state without coordination.

    # The last write wins and the other''s work is lost (lost update).

    state = load_state()

    state["x"] = compute()

    save_state(state)  # without checking version: overwrites concurrent changes

    '
  example_good: '# Optimistic locking: the write fails if the version changed in between.

    state = load_state()

    base_version = state["version"]

    state["x"] = compute()

    save_state_if_unchanged(state, expected_version=base_version)

    '
  detection: 'Detect read->modify->write on shared state without a version token,

    lock, or intermediate CAS (compare-and-swap).

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: extended
  test_ref: tool:pytest
- id: VC-020
  title: Lying documentation
  symptom: Declared state does not match the system
  cause: Persistence of unrevalidated claims
  solution: Subordinate documentation to execution
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - prevented
  action: 'Documentation must not lie: link-integrity and count-parity validation fail when docs drift away from the generated state.

    '
  validating_mechanism: runtime-test
  downstream_verification: none
  example_lang: text
  example_bad: '# README says "supports OAuth" but the code does not implement it.

    '
  example_good: '# Doc subordinated to execution: a test verifies each claim declared in the README.

    '
  detection: 'Capability claims in docs without code/test backing them (doc-code divergence).

    '
  evidence:
  - source: arxiv:2603.28592
    claim: recurring anti-pattern of AI-generated code, present in 80-100% of the analyzed projects.
  tier: extended
  test_ref: tool:pytest
- id: VC-021
  title: Late schema
  symptom: Logic precedes the data model
  cause: Absent causal structure
  solution: Define entities and relations first
  status: PREVENTED
  severity: medium
  tags:
  - vibe-coding
  - prevented
  action: 'Code accesses fields that are not declared in the schema or model, leading to

    runtime AttributeError and silent data corruption when the model changes.

    '
  validating_mechanism: static-ast
  downstream_verification: required
  example_lang: python
  example_bad: '# Accessing a field that does not exist on the model.

    user = User(name="Alice")

    print(user.age)  # AttributeError: ''User'' has no attribute ''age''

    '
  example_good: "# Model declares all fields; access is safe.\nfrom pydantic import BaseModel\nclass User(BaseModel):\n    name: str\n    age: int\nuser = User(name=\"Alice\", age=30)\nprint(user.age)  # OK\n"
  detection: 'AST + type checker: access to attributes not declared in the class/schema.

    Tools: mypy (attr-defined), pylint (E1101), Pydantic validation.

    '
  evidence:
  - source: mypy documentation
    claim: has-attr checks and typed models prevent AttributeError at runtime.
  tier: specialist
  test_ref: tool:ruff
- id: VC-022
  title: Spatial blindness
  symptom: UI generated without an explicit layout
  cause: Lack of a perceptual model
  solution: Declare the visual structure before executing
  status: DOC_ONLY
  severity: medium
  tags:
  - vibe-coding
  - prevented
  action: 'UI code is generated without a structured layout system, producing a fragile

