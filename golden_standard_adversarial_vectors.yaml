- id: AV-097
  title: Unique-BSTs — n=0→1 (empty tree is valid); n=1→1; Catalan number sequence
  domain: D8
  symptom: Returns 0 for n=0 or wrong count for small n
  cause: Agent starts DP at n=1; doesn't establish base case dp[0]=1 for empty subtree
  solution: Test n=0→1; n=1→1; n=2→2; n=3→5; n=4→14
  severity: medium
  tags: [adversarial, DP, BST, Catalan-number, base-case]
  status: AUDITED
