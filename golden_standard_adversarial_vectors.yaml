    test maxMoves=0 (can''t traverse any edge).

    '
  example_lang: python
  example_bad: "def test_components():\n    assert count_components(5, [[0,1],[1,2],[3,4]])\
    \ == 2   # no empty-edges case\n"
  example_good: "def test_components():\n    assert count_components(1, []) == 1 \
    \    # single isolated node\n    assert count_components(4, []) == 4     # all\
    \ isolated\n    assert count_components(2, [[0,1]]) == 1\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under manual-audit: requires human code review
