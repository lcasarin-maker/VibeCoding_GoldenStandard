  evidence_source: lootcode
  evidence_problems:
    - word-break  # ""→True; repeated use of same word; no match→False
  action: >
    Word-break DP must seed dp[0]=True (base case: empty prefix is breakable). Empty string → True.
    Test strings requiring same word used multiple times.
  example_lang: python
  example_bad: |
