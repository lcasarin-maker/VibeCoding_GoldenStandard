  evidence_problems:
    - unique-binary-search-trees  # n=0→1; n=1→1; n=2→2; n=3→5
  action: >
    Unique-BSTs (Catalan number) must initialize dp[0]=1 (one empty tree).
    dp[1]=1, dp[2]=2, dp[3]=5, dp[4]=14. Missing dp[0]=1 causes all dp[n] to be 0.
  example_lang: python
  example_bad: |
