format_version: '3.0.0'
catalog_name: adversarial_vectors
description: 'Adversarial input patterns extracted from 691 lootcode hidden test cases
  (sampling: 20 problems x avg 10 hidden cases). Each vector maps to a concrete failure
  mode an AI agent introduces when only testing example inputs. Source: https://github.com/rmanak/lootcode
  (MIT). Maps to GS D8/D9.

  '
items:
- id: AV-001
  title: Empty collection input
  domain: D8
  symptom: Works on non-empty inputs but crashes or returns wrong value on []
  cause: Agent writes happy-path only; skips the degenerate base case
  solution: Always include an empty-input test case
  severity: high
  tags:
  - adversarial
  - boundary
  - empty-input
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - binary-search-insert-position
  - best-time-to-buy-and-sell-stock-iv
  - edit-distance
  action: 'Every function accepting a list/string/dict must have at least one test
    where that collection is empty. Expected output must be verified, not assumed
    0/None.

    '
  example_lang: python
  example_bad: "def test_insert_pos():\n    assert insert_pos([1,3,5], 2) == 1   #\
    \ no empty-list case\n"
  example_good: "def test_insert_pos():\n    assert insert_pos([], 0) == 0\n    assert\
    \ insert_pos([1,3,5], 2) == 1\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under runtime-test: requires boundary testing
    with empty/extreme values. This remains documentary until a positive fixture and
    local test case are registered.'
  downstream_verification: pytest
- id: AV-002
  title: Empty and whitespace-only string
  domain: D8
  symptom: String parser raises or returns wrong value on "" or "   "
  cause: Agent assumes at least one meaningful character
  solution: Test s="", s="   ", s="-", s="+" as separate cases
  severity: high
  tags:
  - adversarial
  - boundary
  - empty-input
  - string
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - string-to-integer-atoi
  - edit-distance
  action: 'String-processing functions must be tested with empty string, whitespace-only,
    sign-only ("-", "+"), and string starting with parse token then stopping.

    '
  example_lang: python
  example_bad: 'def atoi(s): return int(s.strip())  # crashes on "" or "-"

    '
  example_good: "def test_atoi():\n    assert atoi(\"\") == 0\n    assert atoi(\"\
    \   \") == 0\n    assert atoi(\"-\") == 0\n    assert atoi(\"+1\") == 1\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under runtime-test: requires boundary testing
    with empty/extreme values. This remains documentary until a positive fixture and
    local test case are registered.'
  downstream_verification: pytest
- id: AV-003
  title: Single-element collection
  domain: D8
  symptom: Logic assumes >= 2 elements; fails on size-1 inputs
  cause: Algorithm references index+1 or pair operations without guard
  solution: Add test with collection of length 1
  severity: high
  tags:
  - adversarial
  - boundary
  - singleton
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - find-minimum-in-rotated-sorted-array-ii
  - kth-smallest-element-in-a-sorted-matrix
  - number-of-longest-increasing-subsequence
  - jump-game-v
  - sum-of-subsequence-widths
  action: 'Every function on a collection must include a test where len==1. Catches
    off-by-one, uninitialized accumulators, and pair-based logic bugs.

    '
  example_lang: python
  example_bad: "def test_find_min():\n    assert find_min([3,1,2]) == 1   # no singleton\
    \ test\n"
  example_good: "def test_find_min():\n    assert find_min([1]) == 1       # singleton\n\
    \    assert find_min([3,1,3]) == 1   # duplicates with rotation\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under runtime-test: requires boundary testing
    with empty/extreme values. This remains documentary until a positive fixture and
    local test case are registered.'
  downstream_verification: pytest
- id: AV-004
  title: All-equal elements
  domain: D8
  symptom: Algorithm produces wrong result when all elements are identical
  cause: Comparison-based logic degenerates when hi == lo at every step
  solution: Test array/matrix where every element has the same value
  severity: high
  tags:
  - adversarial
  - degenerate
  - all-equal
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - find-minimum-in-rotated-sorted-array-ii
  - number-of-longest-increasing-subsequence
  - sum-of-subsequence-widths
  action: 'Any algorithm using comparisons (sort, binary search, DP with strict inequality)
    must be tested with a degenerate input where all values are equal.

    '
  example_lang: python
  example_bad: "def test_count_lis():\n    assert count_lis([1,2,3,4]) == 1   # no\
    \ tie case\n"
  example_good: "def test_count_lis():\n    assert count_lis([1,1,1,2,2,2,3,3,3])\
    \ == 27\n    assert count_lis([3,2,1]) == 3\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under llm-judge: requires semantic evaluation
    of output alignment using an LLM evaluator. This remains documentary until a positive
    fixture and local test case are registered.'
  downstream_verification: pytest
- id: AV-005
  title: Monotonically decreasing input
  domain: D8
  symptom: Greedy or DP returns wrong answer on fully descending array
  cause: Algorithm walks left-to-right expecting increase; update branch never fires
  solution: Test with strictly decreasing array
  severity: medium
  tags:
  - adversarial
  - ordering
  - descending
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - best-time-to-buy-and-sell-stock-iv
  - number-of-longest-increasing-subsequence
  action: 'Optimization problems (buy/sell, LIS, subarray) must include a test where
    no profitable operation exists (fully descending). Expected result is typically
    0 or n.

    '
  example_lang: python
  example_bad: "def test_max_profit():\n    assert max_profit([1,2,3], 2) == 2   #\
    \ only ascending case\n"
  example_good: "def test_max_profit():\n    assert max_profit([7,6,4,3,1], 2) ==\
    \ 0\n    assert max_profit([], 2) == 0\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under runtime-test: requires boundary testing
    with empty/extreme values. This remains documentary until a positive fixture and
    local test case are registered.'
  downstream_verification: pytest
- id: AV-006
  title: Zero-value parameter (k=0, n=0, d=0)
  domain: D8
  symptom: Function crashes or returns wrong answer when a numeric parameter is 0
  cause: Agent divides by parameter or uses it as range bound without zero-check
  solution: Test with k=0, n=0, d=0 explicitly
  severity: high
  tags:
  - adversarial
  - boundary
  - zero
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - best-time-to-buy-and-sell-stock-iv
  - count-numbers-with-unique-digits
  action: 'Every function with an integer count/limit/depth parameter must include
    a test where that parameter is 0. Result must be explicitly verified.

    '
  example_lang: python
  example_bad: "def test_max_profit_k():\n    assert max_profit_k([1,2,3], 1) == 2\
    \   # k=0 never tested\n"
  example_good: "def test_max_profit_k():\n    assert max_profit_k([1,2,3], 0) ==\
    \ 0\n    assert max_profit_k([1,2,3], 1) == 2\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under runtime-test: requires boundary testing
    with empty/extreme values. This remains documentary until a positive fixture and
    local test case are registered.'
  downstream_verification: pytest
- id: AV-007
  title: Integer overflow and INT32 clamping
  domain: D8
  symptom: Parser returns unclipped value beyond INT32 bounds
  cause: Agent uses Python unbounded int without applying INT32 clamp
  solution: Test with INT32_MAX+1 and INT32_MIN-1
  severity: high
  tags:
  - adversarial
  - overflow
  - clamping
  - string
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - string-to-integer-atoi
  action: 'Numeric parsers and accumulators must be tested at INT32_MAX (2147483647),
    INT32_MAX+1, INT32_MIN (-2147483648), INT32_MIN-1. Python''s int won''t overflow
    natively — clamp must be explicit.

    '
  example_lang: python
  example_bad: 'def atoi(s): return int(s.lstrip())   # returns 2147483648 for "2147483648"

    '
  example_good: "def test_atoi_overflow():\n    assert atoi(\"2147483648\") == 2147483647\n\
    \    assert atoi(\"-2147483649\") == -2147483648\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under runtime-test: requires boundary testing
    with empty/extreme values. This remains documentary until a positive fixture and
    local test case are registered.'
  downstream_verification: pytest
- id: AV-008
  title: Self-referential or identity operation
  domain: D8
  symptom: Wrong result when both inputs are the same node, element, or index
  cause: Agent assumes two distinct inputs; logic for p==q is never exercised
  solution: Test where both arguments are the same object or same value
  severity: medium
  tags:
  - adversarial
  - identity
  - self-reference
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - union-find-connectivity-queries
  - lowest-common-ancestor-of-a-binary-tree
  - image-overlap
  action: 'Functions taking two elements (nodes, sets, indices) must be tested where
    both arguments are the same. Catches missing identity guards and incorrect loop
    termination when searching for a common ancestor/parent.

    '
  example_lang: python
  example_bad: "def test_lca():\n    assert lca(tree, 4, 7).val == 1   # no case where\
    \ p is ancestor of q\n"
  example_good: "def test_lca():\n    assert lca(tree, 9, -28).val == 9   # 9 is ancestor\
    \ of -28\n    assert lca(tree, 20, -14).val == 20  # p is ancestor of q\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under runtime-test: requires boundary testing
    with empty/extreme values. This remains documentary until a positive fixture and
    local test case are registered.'
  downstream_verification: pytest
- id: AV-009
  title: All-zero matrix or empty grid
  domain: D8
  symptom: Grid traversal counts wrong when all cells are 0 or grid is 1x1
  cause: Agent skips null-content case assuming at least one non-zero entry
  solution: Test matrix with all zeros and 1×1 single-cell matrix
  severity: medium
  tags:
  - adversarial
  - boundary
  - matrix
  - grid
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - battleships-in-a-board
  - image-overlap
  - kth-smallest-element-in-a-sorted-matrix
  action: 'Grid/matrix functions must be tested with: all-zero content (→ count 0),
    1×1 grid, and answer at last row/column (not just top-left).

    '
  example_lang: python
  example_bad: "def test_battleships():\n    assert count_battleships([\"XOX\",\"\
    OOO\",\"XOX\"]) == 4   # no all-dot case\n"
  example_good: "def test_battleships():\n    assert count_battleships([\"...\"])\
    \ == 0\n    assert count_battleships([\"X\"]) == 1\n    assert count_battleships([\"\
    X....\",\"X....\",\"X...X\"]) == 2\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under runtime-test: requires boundary testing
    with empty/extreme values. This remains documentary until a positive fixture and
    local test case are registered.'
  downstream_verification: pytest
- id: AV-010
  title: Duplicate values in input
  domain: D8
  symptom: Algorithm assumes distinct values; wrong count or index on duplicates
  cause: Set-based deduplication or strict-inequality comparisons silently drop duplicates
  solution: Test input with repeated values at various positions
  severity: high
  tags:
  - adversarial
  - duplicates
  - counting
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - find-minimum-in-rotated-sorted-array-ii
  - sum-of-subsequence-widths
  - number-of-longest-increasing-subsequence
  - kth-smallest-element-in-a-sorted-matrix
  action: 'Sorting/searching algorithms must be tested with all duplicates, partial
    duplicates, and duplicates at boundary positions. Count-based problems must verify
    the exact number of tied configurations, not just the optimal value.

    '
  example_lang: python
  example_bad: "def test_find_min():\n    assert find_min([3,1,2]) == 1   # no duplicate\
    \ case\n"
  example_good: "def test_find_min():\n    assert find_min([3,1,3]) == 1\n    assert\
    \ find_min([2,2,2,2]) == 2\n    assert find_min([1,1,1,0,1]) == 0\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under runtime-test: requires boundary testing
    with empty/extreme values. This remains documentary until a positive fixture and
    local test case are registered.'
  downstream_verification: pytest
- id: AV-011
  title: Negative values in numeric input
  domain: D8
  symptom: Algorithm fails when inputs include negative integers
  cause: Agent assumes non-negative domain; abs(), min(), or index calculations break
  solution: Test with purely-negative arrays and mixed-sign arrays
  severity: medium
  tags:
  - adversarial
  - negative-values
  - numeric
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - 3sum-closest
  - kth-smallest-element-in-a-sorted-matrix
  - binary-search-insert-position
  - lowest-common-ancestor-of-a-binary-tree
  action: 'Numeric functions must be tested with purely-negative arrays, mixed-sign
    arrays, and negative target/search values. Catches abs() misuse and distance calculations
    that assume positive coordinates.

    '
  example_lang: python
  example_bad: "def test_k_closest():\n    assert k_closest([[1,2],[3,4]], 1) == [[1,2]]\
    \   # no negative coords\n"
  example_good: "def test_k_closest():\n    assert k_closest([[3,-9],[-5,5]], 1) ==\
    \ [[-5,5]]\n    assert k_closest([[-9,-3],[-7,-1]], 2) == [[-7,-1],[-9,-3]]\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under runtime-test: requires boundary testing
    with empty/extreme values. This remains documentary until a positive fixture and
    local test case are registered.'
  downstream_verification: pytest
- id: AV-012
  title: Idempotent repeated operation
  domain: D8
  symptom: Applying the same operation twice yields different result than once
  cause: Agent mutates shared state without reset; union(x,x) corrupts rank/parent
  solution: Test that union/merge/add of element with itself is a no-op
  severity: medium
  tags:
  - adversarial
  - idempotency
  - stateful
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - union-find-connectivity-queries
  action: 'Stateful data structures (union-find, graph, cache) must be tested for
    idempotency: same mutation applied twice must leave state identical to applying
    it once.

    '
  example_lang: python
  example_bad: "def union(self, x, y):\n    self.parent[self.find(x)] = self.find(y)\
    \   # union(x,x) may corrupt rank\n"
  example_good: "def test_union_find():\n    uf = UnionFind(4)\n    uf.union(1,1);\
    \ uf.union(1,1)\n    assert not uf.connected(0,1)   # other nodes unaffected\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under manual-audit: requires human code review
    / peer verification. This remains documentary until a positive fixture and local
    test case are registered.'
  downstream_verification: pytest
- id: AV-013
  title: Boundary depth parameter in tree modification (d=1)
  domain: D8
  symptom: Tree-modification fails when depth=1 (new node becomes root)
  cause: Traversal-based implementation never handles d=1 as pre-recursion special
    case
  solution: Test with d=1 and d==tree_height explicitly
  severity: medium
  tags:
  - adversarial
  - tree
  - boundary
  - depth
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - add-one-row-to-tree
  action: 'Tree modification functions with a depth parameter must be tested at d=1
    (root replacement) and d==tree_height (leaf level). These expose pre-recursion
    and post-recursion handling that mid-level tests never exercise.

    '
  example_lang: python
  example_bad: "def test_add_row():\n    assert add_one_row(tree_123, 9, 2) == [1,9,9,2,None,None,3]\
    \   # no d=1 case\n"
  example_good: "def test_add_row():\n    assert serialize(add_one_row(tree_123, 5,\
    \ 1)) == [5,1,None,2,3]\n    assert serialize(add_one_row(tree_1, 2, 2)) == [1,2,2]\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under manual-audit: requires human code review
    / peer verification. This remains documentary until a positive fixture and local
    test case are registered.'
  downstream_verification: pytest
- id: AV-014
  title: k equals or exceeds collection size
  domain: D8
  symptom: Algorithm panics or returns wrong result when k >= len(collection)
  cause: Agent assumes k < n; slicing or heap operations access out-of-bounds
  solution: Test with k==len(collection) and k > len(collection)
  severity: high
  tags:
  - adversarial
  - boundary
  - k-parameter
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - k-closest-points-to-origin
  - best-time-to-buy-and-sell-stock-iv
  - kth-smallest-element-in-a-sorted-matrix
  action: 'Functions with k-parameter must include: k==1 (minimum), k==len (all elements),
    and k > len (clamped or treated as unlimited).

    '
  example_lang: python
  example_bad: "def test_k_closest():\n    assert k_closest([[1,3],[-2,2]], 1) ==\
    \ [[-2,2]]   # k<len only\n"
  example_good: "def test_k_closest():\n    pts = [[1,0],[0,2],[3,0]]\n    result\
    \ = k_closest(pts, 3)   # k==len → all points\n    assert set(map(tuple, result))\
    \ == {(1,0),(0,2),(3,0)}\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under runtime-test: requires boundary testing
    with empty/extreme values. This remains documentary until a positive fixture and
    local test case are registered.'
  downstream_verification: pytest
- id: AV-015
  title: Ambiguous sign prefix in string parsers
  domain: D8
  symptom: Parser mishandles "+number", "+-number", or sign-only "-"
  cause: Agent implements minus case but forgets explicit "+" or double-sign rejection
  solution: Test "+1", "+-12", "-", and leading zeros "00123"
  severity: medium
  tags:
  - adversarial
  - string
  - parsing
  - sign
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - string-to-integer-atoi
  action: 'String-to-number parsers must explicitly test: explicit plus, double sign,
    sign with no digits, leading zeros, and sign embedded mid-string ("38+a8b"→38).

    '
  example_lang: python
  example_bad: "def atoi(s):\n    sign = -1 if s and s[0]=='-' else 1   # misses explicit\
    \ '+'\n"
  example_good: "def test_atoi_signs():\n    assert atoi(\"+1\") == 1\n    assert\
    \ atoi(\"+-12\") == 0\n    assert atoi(\"-\") == 0\n    assert atoi(\"00123\"\
    ) == 123\n    assert atoi(\"38+a8b 88a\") == 38\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under runtime-test: requires boundary testing
    with empty/extreme values. This remains documentary until a positive fixture and
    local test case are registered.'
  downstream_verification: pytest
- id: AV-016
  title: Variable shadowing in nested scopes
  domain: D8
  symptom: Interpreter returns wrong value when inner scope re-binds an outer variable
  cause: Flat dict for all variables; inner binding overwrites outer permanently
  solution: Test expressions with same variable name at multiple nesting levels
  severity: high
  tags:
  - adversarial
  - scoping
  - interpreter
  - nested
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - parse-lisp-expression
  action: 'Expression evaluators must test: variable re-binding in same scope, inner
    scope shadowing outer, and correct restoration of outer value after inner scope
    exits.

    '
  example_lang: python
  example_bad: "def evaluate(expr):\n    env = {}   # flat dict; inner let clobbers\
    \ outer variable permanently\n"
  example_good: "def test_evaluate():\n    assert evaluate(\"(let x 3 x 2 x)\") ==\
    \ 2\n    assert evaluate(\"(let x 2 (mult x (let x 3 y 4 (add x y))))\") == 14\n\
    \    assert evaluate(\"(let x 1 y 2 x (add x y) (add x y))\") == 5\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under runtime-test: requires boundary testing
    with empty/extreme values. This remains documentary until a positive fixture and
    local test case are registered.'
  downstream_verification: pytest
- id: AV-017
  title: All-same elements in turbulent/mountain subarray
  domain: D8
  symptom: Subarray algorithm returns wrong length when all values are equal
  cause: Agent's direction-flip logic never triggers on flat input; returns n instead
    of 1
  solution: Test A=[9,9] (turbulent), arr=[3,2,1] (mountain needs peak)
  severity: high
  tags:
  - adversarial
  - degenerate
  - subarray
  - all-equal
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
  - longest-turbulent-subarray
  - longest-mountain-in-array
  action: 'Subarray problems with directional constraints (turbulent, mountain, peak/valley)
    must be tested with: all-same values (→ 1 or 0), strictly monotone sequences (no
    direction change), and alternating sequences (maximum turbulence).

    '
  example_lang: python
  example_bad: "def test_turbulent():\n    assert turbulent([9,4,2,10,7,8,8,1,9])\
    \ == 5   # no flat case\n"
  example_good: "def test_turbulent():\n    assert turbulent([9,9]) == 1         \
    \  # all-equal → 1\n    assert turbulent([3,3,3,3]) == 1       # flat → 1\n  \
    \  assert turbulent([0,1,0,1,0]) == 5     # max turbulence\n"
  validating_mechanism: DOC_ONLY
  doc_only_justification: 'Falsifiable under runtime-test: requires boundary testing
    with empty/extreme values. This remains documentary until a positive fixture and
    local test case are registered.'
  downstream_verification: pytest
- id: AV-018
  title: Graph with no edges (isolated nodes)
  domain: D8
  symptom: Graph algorithm returns wrong component count or reachability on edgeless
    graph
  cause: Agent assumes edges exist; traversal never executes; initial state is wrong
  solution: Test n > 1 with edges=[]
  severity: high
  tags:
  - adversarial
  - boundary
  - graph
  - isolated
  status: DOC_ONLY
  tier: core
  evidence_source: lootcode
  evidence_problems:
