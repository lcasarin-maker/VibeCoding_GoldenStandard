name: Golden Standard Audit

on:
  pull_request:
    paths:
      - "generate_golden_audit.py"
      - "golden_standard*.yaml"
      - "Wiki/**"
      - "scripts/**"
      - ".github/workflows/audit.yml"
  push:
    branches:
      - master
    paths:
      - "generate_golden_audit.py"
      - "golden_standard*.yaml"
      - "Wiki/**"
      - "scripts/**"
      - ".github/workflows/audit.yml"

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Validate catalogs and wiki coverage
        run: python scripts/validate_golden_standard_catalogs.py --check-wiki

      - name: Regenerate Golden Standard audit artifacts
        run: python generate_golden_audit.py
