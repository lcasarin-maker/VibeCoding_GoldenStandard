name: Golden Standard Audit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/generate_golden_audit.py"
      - "gs_generator/**"
      - "config/semgrep_vices.yaml"
      - "config/semgrep_vices_map.yaml"
      - "output/golden_standard*.json"
      - "output/golden_standard_audit_report.md"
      - "golden_standard*.yaml"
      - "docs/badges/**"
      - "Wiki/**"
      - "scripts/**"
      - ".github/workflows/audit.yml"
  push:
    branches:
      - master
      - "agent/**"
    paths:
      - "scripts/generate_golden_audit.py"
      - "gs_generator/**"
      - "config/semgrep_vices.yaml"
      - "config/semgrep_vices_map.yaml"
      - "output/golden_standard*.json"
      - "output/golden_standard_audit_report.md"
      - "golden_standard*.yaml"
      - "docs/badges/**"
      - "Wiki/**"
      - "scripts/**"
      - ".github/workflows/audit.yml"

jobs:
  audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml pytest semgrep

      - name: Check catalog integrity (UTF-8, non-empty, valid YAML)
        run: python scripts/check_catalog_integrity.py

      - name: Structural audit (SP-001/003/004/006/007/009/010)
        run: python scripts/audit.py

      - name: Golden Standard lint ratchet
        run: python scripts/gs_lint.py

      - name: Validate catalogs and wiki coverage
        run: python scripts/validate_golden_standard_catalogs.py --check-wiki

      - name: Run pytest suite
        run: pytest -W error

      - name: Prove local detectors fire on example_bad and not example_good
        run: python scripts/test_detectors.py

      - name: Run Semgrep guard rules
        run: semgrep --config config/semgrep_vices.yaml --error scripts gs_generator

      - name: Measure Semgrep rule effectiveness
        run: python scripts/semgrep_effectiveness_eval.py --no-write

      - name: Regenerate Golden Standard audit artifacts
        run: python scripts/generate_golden_audit.py

      - name: Verify generated artifacts are up to date
        run: |
          git diff --exit-code -- \
            output/golden_standard_audit_report.md \
            output/golden_standard_audit.json \
            output/golden_standard_graph.json \
            output/golden_standard_metrics.json \
            docs/badges/ \
            Wiki/
