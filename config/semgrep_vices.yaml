version: 1
rules:
  - id: gs-vc-095-hardcoded-secret
    message: "VC-095: possible hardcoded secret or credential"
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-regex: (?i)(password|passwd|secret|api[_-]?key|token)\s*=\s*["'][^"']{8,}["']
    metadata:
      vice_ids: [VC-095, VC-036]
      category: vibe-coding
  - id: gs-vc-115-unsafe-eval
    message: "VC-115: dynamic execution is forbidden"
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: eval(...)
          - pattern: exec(...)
          - pattern: compile(...)
    metadata:
      vice_ids: [VC-115, VC-049]
      category: vibe-coding
  - id: gs-vc-109-hardcoded-path
    message: "VC-109: hardcoded absolute path"
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-regex: |-
          ["'][A-Za-z]:[\\/][^"']+["']
    metadata:
      vice_ids: [VC-109, VC-043]
      category: vibe-coding
  - id: gs-vt-040-blind-except
    message: "VT-040: exception is silently absorbed"
    severity: ERROR
    languages: [python]
    pattern: |
      try:
        ...
      except Exception:
        pass
    metadata:
      vice_ids: [VT-040]
      category: testing
  - id: gs-vt-043-unconditional-exit-zero
    message: "VT-043: unconditional successful exit"
    severity: ERROR
    languages: [python]
    pattern: sys.exit(0)
    metadata:
      vice_ids: [VT-043]
      category: testing
  - id: gs-vt-005-vacuous-assert
    message: "VT-005: vacuous assertion"
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: assert True
      - pattern: self.assertTrue(True)
    metadata:
      vice_ids: [VT-005]
      category: testing
  - id: gs-vt-009-tautological-assert
    message: "VT-009: tautological assertion"
    severity: ERROR
    languages: [python]
    pattern: assert $X == $X
    metadata:
      vice_ids: [VT-009]
      category: testing
  - id: gs-vc-036-destructive-without-dryrun
    message: "VC-036: destructive command lacks dry-run or simulation"
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-regex: (?i)(rm\s+-rf\b|git\s+reset\s+--hard\b|\bDROP\s+(?:TABLE|DATABASE)\b|\bTRUNCATE\s+(?:TABLE|DATABASE)\b)
      - pattern-not-regex: (?i)(--dry-run\b|-print\b|\bEXPLAIN\b|\becho\b)
    metadata:
      vice_ids: [VC-036]
      category: vibe-coding
  - id: gs-vc-038-optimistic-config
    message: "VC-038: optimistic config hardcodes environment-sensitive values"
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: DEBUG = True
          - pattern: TESTING = True
          - pattern-regex: (?i)(DATABASE_URL|API_KEY|SECRET_KEY|PASSWORD)\s*=\s*['\"][^'\"]+['\"]
    metadata:
      vice_ids: [VC-038]
      category: vibe-coding
  - id: gs-vc-025-io-without-validation
    message: "VC-025: external input reaches a sink without validation"
    severity: ERROR
    languages: [python]
    mode: taint
    pattern-sources:
      - pattern-either:
          - pattern: request.args[$KEY]
          - pattern: request.files[$KEY]
          - pattern: request.form[$KEY]
          - pattern: request.json[$KEY]
          - pattern: sys.argv[$IDX]
          - pattern: input(...)
    pattern-sinks:
      - pattern-either:
          - pattern: $DB.execute(...)
          - pattern: exec(...)
          - pattern: system(...)
          - pattern: popen(...)
          - pattern: subprocess.run(...)
          - pattern: subprocess.call(...)
          - pattern: subprocess.Popen(...)
    pattern-sanitizers:
      - pattern-either:
          - pattern: validate_int(...)
          - pattern: safe_int(...)
          - pattern: schema.load(...)
          - pattern: parameterize(...)
          - pattern: escape(...)
    metadata:
      vice_ids: [VC-025]
      category: vibe-coding
  - id: gs-vc-017-deadlock-without-heartbeat
    message: "VC-017: blocking call lacks timeout or heartbeat"
    severity: ERROR
    languages: [python]
    pattern-regex: (?m)\b\w+\.\s*join\s*\(\s*\)
    metadata:
      vice_ids: [VC-017]
      category: vibe-coding
  - id: gs-vt-006-test-without-assert
    message: "VT-006: test function has no oracle"
    severity: ERROR
    languages: [python]
    patterns:
      - pattern: |
          def $FUNC(...):
            ...
      - metavariable-regex:
          metavariable: $FUNC
          regex: ^test_
      - pattern-not-inside: |
          def $FUNC(...):
            ...
            assert ...
      - pattern-not-inside: |
          def $FUNC(...):
            ...
            with pytest.raises(...):
              ...
    metadata:
      vice_ids: [VT-006]
      category: testing
  - id: gs-vc-094-bom-in-config
    message: "VC-094: UTF-8 BOM makes the first configuration key unsafe"
    severity: ERROR
    languages: [generic]
    paths:
      include: ["*.env", "*.yaml", "*.yml", "*.json", "*.toml", "*.ini"]
    pattern-regex: '^\x{FEFF}'
    metadata:
      vice_ids: [VC-094]
      category: vibe-coding
  - id: gs-vc-050-runtime-dependency-install
    message: "VC-050: application code installs dependencies at runtime"
    severity: ERROR
    languages: [python]
    pattern-regex: '(?i)(?:os\.system|subprocess\.(?:run|call|Popen))\s*\([^\n]*(?:pip|npm|pnpm|yarn)\s+(?:install|add)\b'
    metadata:
      vice_ids: [VC-050]
      category: vibe-coding
  - id: gs-vc-051-non-atomic-state-write
    message: "VC-051: critical state is truncated without an atomic replace"
    severity: ERROR
    languages: [python]
    patterns:
      - pattern: open($PATH, "w")
      - metavariable-regex:
          metavariable: $PATH
          regex: '(?i)"[^"]+\.(?:json|ya?ml|db|sqlite3?)"'
    metadata:
      vice_ids: [VC-051]
      category: vibe-coding
  - id: gs-vt-080-physical-address-assert
    message: "VT-080: assertion depends on identity, address, or unstable hash"
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: assert id($X) == $Y
      - pattern: assert $Y == id($X)
      - pattern: assert hash($X) == $Y
      - pattern: assert $Y == hash($X)
    metadata:
      vice_ids: [VT-080]
      category: testing
  - id: gs-vt-106-unjustified-coverage-exclusion
    message: "VT-106: coverage exclusion lacks an inline reason or review marker"
    severity: ERROR
    languages: [generic]
    paths:
      include: [".coveragerc", "*coverage*.ini", "pyproject.toml"]
    pattern-regex: '(?mi)^\s*(?:omit|exclude_lines)\s*=(?![^\n]*(?:reason|justification|reviewed(?:_at)?))'
    metadata:
      vice_ids: [VT-106]
      category: testing
