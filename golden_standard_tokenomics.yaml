    example_lang: text
    example_bad: |
      # Nueva sesion reinicia todo: se reexplica el estado desde cero.
    example_good: |
      # Cerrar con checkpoint fisico (STATUS.md) para reanudar sin reconstruir.
    detection: |
      Sesiones que arrancan sin un checkpoint de cierre previo reutilizable.
