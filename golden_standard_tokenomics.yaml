  - id: TK-009
    title: Poda semántica
    symptom: Archivos completos saturan el prompt
    cause: Recuperación por documento, no por necesidad
    solution: Extraer secciones relevantes
    status: DOC_ONLY
    severity: low
    tags:
      - tokenomics
      - doc-only
    action: 'Behavioral/doctrinal tokenomics vice — not statically falsifiable in
