  - id: TK-043
    title: Entropy without pruning — input governance without output governance
    symptom: 'The system validates what comes IN (anti-junk-code, large-file, gates)
      but nothing hunts what must go OUT: refactors leave residue (dead imports/params,
      backups, phantom scripts, duplicate docs, orphan IDs in the catalog)
      that the gate approves just for existing'
    cause: Letter-of-the-law validation (`Path.exists`) instead of relevance;
      append-only culture; no retention policy or owner for the cleanup
    solution: Hunt orphans as a GATE (dead-code/vulture, allowlist without
      a file, dirs without retention, duplicate-purpose docs); REPLACE =
      `rm` + create in the same commit
    status: PREVENTED
    severity: low
    tags:
      - tokenomics
      - prevented
    action: Tokenomics cleanup validation now rejects orphan markdown files in 
      Wiki/Vices and Wiki/Tokenomics so residual docs cannot linger unnoticed.
    validating_mechanism: validate_golden_standard_catalogs.py --check-wiki
    downstream_verification: none
    example_lang: bash
    example_bad: |
      # The refactor leaves residue; the gate approves because the file 'exists'.
      git mv old.py new.py        # dead old import, backup, and duplicate doc stay alive
    example_good: |
      # Replace = delete + create in the SAME commit; hunt orphans as a gate.
      vulture src/ && git rm old.py backups/old.py docs/old.md && git add new.py
    detection: |
      Output gate: dead-code (vulture), allowlists without a file, directories without
      a retention policy, and duplicate-purpose docs; fails if a refactor leaves residue.
    evidence:
      - source: "vexp.dev / HumanLayer ACE"
        claim: "unpruned residue inflates context and cost; output governance is
          as necessary as input governance."
    tier: extended
