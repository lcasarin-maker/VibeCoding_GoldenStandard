    cause: Validación de letra (`Path.exists`) en vez de vigencia; cultura 
      append-only; sin política de retención ni dueño de la limpieza
    solution: Cazar huérfanos como COMPUERTA (dead-code/vulture, allowlist sin 
      archivo, dirs sin retención, docs de propósito duplicado); REEMPLAZAR = 
      `rm` + crear en el mismo commit
    status: PREVENTED
    severity: low
    tags:
      - tokenomics
      - prevented
    action: Tokenomics cleanup validation now rejects orphan markdown files in 
      Wiki/Vices and Wiki/Tokenomics so residual docs cannot linger unnoticed.
    validating_mechanism: validate_golden_standard_catalogs.py --check-wiki
    downstream_verification: none
    example_lang: bash
    example_bad: |
      # El refactor deja residuo; el gate aprueba porque el archivo 'existe'.
      git mv old.py new.py        # old import muerto, backup y doc duplicado quedan vivos
    example_good: |
      # Reemplazar = borrar + crear en el MISMO commit; cazar huerfanos como compuerta.
      vulture src/ && git rm old.py backups/old.py docs/old.md && git add new.py
    detection: |
      Compuerta de salida: dead-code (vulture), allowlists sin archivo, directorios sin
      politica de retencion y docs de proposito duplicado; falla si un refactor deja residuo.
    evidence:
      - source: "vexp.dev / HumanLayer ACE"
        claim: "el residuo no podado infla el contexto y el costo; la gobernanza de
          salida es tan necesaria como la de entrada."
    tier: extended
  - id: TK-044
    title: Deuda de tokenomics acumulada (Cost Compounding)
    symptom: |
      El costo por sesion crece silenciosamente porque nunca se compacta ni se mide; las sesiones largas pagan 3-5x mas tokens que el trabajo estructurado.
    cause: |
      Sin compactacion periodica ni telemetria de costo, el contexto crece de forma monotona y cada turno arrastra todo el historial.
    solution: |
      Compactar en umbrales de uso, medir el costo por sesion y operar con presupuesto y alertas.
    status: PREVENTED
    severity: medium
    tags:
      - tokenomics
      - prevented-mechanically
    action: |
      Prevención física mediante control de presupuesto y bloqueo de ejecución cuando los tokens acumulados por sesión superan los límites de eficiencia (80K tokens de salida), forzando el comando de compactación.
    validating_mechanism: _check_and_flag_compact
    downstream_verification: none
    example_lang: text
    example_bad: |
      # Sesion de 4 horas sin compactar; el contexto llega al 95% y el costo se dispara.
    example_good: |
      # Compactacion en umbrales + presupuesto con alertas + telemetria de costo por sesion.
    detection: |
      Sesiones largas sin eventos de compactacion ni telemetria de costo; crecimiento monotono del contexto. Relacionado con TK-031 (compactacion) y TK-040 (ahorro no medido).
    evidence:
      - source: "vexp.dev"
        claim: "vibe coding sin estructura cuesta ~3-5x mas (~$300-450/mes vs ~$90-135/mes
          estructurado)."
    tier: extended
