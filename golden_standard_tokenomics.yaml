    validating_mechanism: DOC_ONLY
    downstream_verification: required
    example_lang: text
    example_bad: |
      # Prompt with no output budget -> useless preambles and closings.
      "Explain why and then give me the JSON"   -> 600 tokens of prose + JSON
    example_good: |
      # Constrain the output format and length.
      "Respond ONLY with the JSON, no additional text."   -> ~40 tokens
    detection: |
      Outputs with preamble/explanation/closing when the task only requires the
      datum; absence of format or length constraints.
    evidence:
      - source: "vexp.dev / HumanLayer ACE"
        claim: "unstructured context consumes 3-5x more tokens; selective retrieval,
          caching, and compaction are the central levers."
    tier: specialist
  - id: TK-001
    title: Missing checkpoint
    symptom: A new session restarts everything
    cause: Ephemeral state
    solution: Close with a physical or logical summary
    status: PREVENTED
    severity: low
    tags:
      - tokenomics
      - prevented
    action: |
      Close each session with a durable checkpoint so a new session does not restart from zero; the canonical checkpoint guidance must stay published and linked from the index, which a CI link-check verifies.
    validating_mechanism: runtime-test
    enforcement:
      golden_standard:
        mechanism: "catalog/wiki link check"
    downstream_verification: none
    example_lang: text
    example_bad: |
      # A new session restarts everything: state is re-explained from scratch.
    example_good: |
      # Close with a physical checkpoint (STATUS.md) to resume without rebuilding.
    detection: |
      Sessions that start without a reusable prior closing checkpoint.
    evidence:
      - source: "vexp.dev / HumanLayer ACE"
        claim: "unstructured context consumes 3-5x more tokens; selective retrieval,
          caching, and compaction are the central levers."
    tier: extended
