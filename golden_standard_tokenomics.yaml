    downstream_verification: required
    example_lang: python
    example_bad: |
      ctx = "\n".join(open(f).read() for f in all_files)   # saturates the prompt
    example_good: |
      ctx = "\n".join(extract_relevant(f, task) for f in candidate_files)
    detection: |
      Concatenating entire files into the prompt instead of extracting the sections
      required by the task.
    evidence:
