format_version: 3.0
catalog_name: tokenomics
items:
  - id: TK-F01
    title: Reprocessing stable context
    symptom: The same block is paid for or processed many times
    cause: Unmodeled reuse
    solution: Separate stable context from volatile context
    status: DOC_ONLY
    severity: low
    tags:
      - tokenomics
      - doc-only
    action: 'Behavioral/doctrinal tokenomics vice — not statically falsifiable in
      a generic way. Documented in the Golden Standard catalogs as governance knowledge;
      no automated test can discriminate this without human semantic judgment. Sprint
      3.4 triage: reclassified from AUDITED/test_d10_tokenomics to DOC_ONLY.'
    validating_mechanism: DOC_ONLY
    downstream_verification: required
    example_lang: python
    example_bad: |
      # The same stable block is resent on every call: paid for N times.
      for q in questions:
          call(model, system=BIG_STABLE_DOCS + q)     # no cache
    example_good: |
      # Mark the stable prefix as cacheable: paid for once.
      call(model, system=[{"text": BIG_STABLE_DOCS, "cache_control": {"type": "ephemeral"}}, q])
    detection: |
      Repeated calls that resend the same stable prefix without prompt caching /
      cache_control.
    evidence:
      - source: "vexp.dev / HumanLayer ACE"
        claim: "unstructured context consumes 3-5x more tokens; selective retrieval,
          caching, and compaction are the central levers."
    tier: specialist
  - id: TK-F02
    title: Primitive context pruning
    symptom: Small tasks load entire documents
    cause: Non-selective retrieval
    solution: Extract only the relevant fragments
    status: DOC_ONLY
    severity: low
    tags:
      - tokenomics
      - doc-only
    action: 'Behavioral/doctrinal tokenomics vice — not statically falsifiable in
      a generic way. Documented in the Golden Standard catalogs as governance knowledge;
      no automated test can discriminate this without human semantic judgment. Sprint
      3.4 triage: reclassified from AUDITED/test_d10_tokenomics to DOC_ONLY.'
    validating_mechanism: DOC_ONLY
    downstream_verification: required
    example_lang: python
    example_bad: |
      # Tiny task that loads the entire document.
      ctx = open("manual_500p.md").read()
      answer = call(model, ctx + "what is the retry limit?")
    example_good: |
      # Retrieve only the relevant fragment.
      ctx = retrieve("manual_500p.md", query="retry limit", k=1)
      answer = call(model, ctx + "...")
    detection: |
      Loading entire documents for localized queries instead of retrieving the
      relevant fragments.
    evidence:
      - source: "vexp.dev / HumanLayer ACE"
        claim: "unstructured context consumes 3-5x more tokens; selective retrieval,
          caching, and compaction are the central levers."
    tier: specialist
  - id: TK-F03
    title: Excessive verbal output
    symptom: Preambles, explanations, and closings add no value
    cause: Missing output budget
    solution: Constrain output format and length
    status: DOC_ONLY
    severity: low
    tags:
      - tokenomics
      - doc-only
    action: 'Behavioral/doctrinal tokenomics vice — not statically falsifiable in
      a generic way. Documented in the Golden Standard catalogs as governance knowledge;
