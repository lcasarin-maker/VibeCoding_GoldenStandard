    downstream_verification: required
    example_lang: python
    example_bad: |
      ctx = "\n".join(open(f).read() for f in all_files)   # satura el prompt
    example_good: |
      ctx = "\n".join(extract_relevant(f, task) for f in candidate_files)
    detection: |
      Concatenar archivos completos al prompt en vez de extraer las secciones requeridas
      por la tarea.
    evidence:
