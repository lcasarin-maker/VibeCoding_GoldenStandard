format_version: 3.0
catalog_name: tokenomics
items:
  - id: TK-F01
    title: Reprocesamiento de contexto estable
    symptom: El mismo bloque se paga o procesa muchas veces
    cause: Reuso no modelado
    solution: Separar contexto estable y contexto volatil
    status: DOC_ONLY
    severity: low
    tags:
      - tokenomics
      - doc-only
    action: 'Behavioral/doctrinal tokenomics vice — not statically falsifiable in
      a generic way. Documented in the Golden Standard catalogs as governance knowledge;
      no automated test can discriminate this without human semantic judgment. Sprint
      3.4 triage: reclassified from AUDITED/test_d10_tokenomics to DOC_ONLY.'
    validating_mechanism: DOC_ONLY
    downstream_verification: required
    example_lang: python
    example_bad: |
      # Se reenvia el mismo bloque estable en cada llamada: se paga N veces.
      for q in questions:
          call(model, system=BIG_STABLE_DOCS + q)     # sin cache
    example_good: |
      # Marcar el prefijo estable como cacheable: se paga una vez.
      call(model, system=[{"text": BIG_STABLE_DOCS, "cache_control": {"type": "ephemeral"}}, q])
    detection: |
      Llamadas repetidas que reenvian un mismo prefijo estable sin prompt caching /
      cache_control.
    evidence:
      - source: "vexp.dev / HumanLayer ACE"
        claim: "el contexto sin estructura consume 3-5x mas tokens; recuperacion selectiva,
          caching y compactacion son las palancas centrales."
    tier: specialist
  - id: TK-F02
    title: Poda contextual primitiva
    symptom: Tareas pequeñas cargan documentos completos
    cause: Recuperacion no selectiva
    solution: Extraer solo fragmentos relevantes
    status: DOC_ONLY
    severity: low
    tags:
      - tokenomics
      - doc-only
    action: 'Behavioral/doctrinal tokenomics vice — not statically falsifiable in
      a generic way. Documented in the Golden Standard catalogs as governance knowledge;
      no automated test can discriminate this without human semantic judgment. Sprint
      3.4 triage: reclassified from AUDITED/test_d10_tokenomics to DOC_ONLY.'
    validating_mechanism: DOC_ONLY
    downstream_verification: required
    example_lang: python
    example_bad: |
      # Tarea minuscula que carga el documento entero.
      ctx = open("manual_500p.md").read()
      answer = call(model, ctx + "cual es el limite de reintentos?")
    example_good: |
      # Recuperar solo el fragmento relevante.
      ctx = retrieve("manual_500p.md", query="limite de reintentos", k=1)
      answer = call(model, ctx + "...")
    detection: |
      Cargar documentos completos para consultas localizadas en vez de recuperar
      fragmentos relevantes.
    evidence:
      - source: "vexp.dev / HumanLayer ACE"
        claim: "el contexto sin estructura consume 3-5x mas tokens; recuperacion selectiva,
          caching y compactacion son las palancas centrales."
    tier: specialist
  - id: TK-F03
    title: Salida verbal excesiva
    symptom: Preámbulos, explicaciones y cierres no agregan valor
    cause: Presupuesto de salida ausente
    solution: Restringir formato y longitud de salida
    status: DOC_ONLY
    severity: low
    tags:
      - tokenomics
      - doc-only
    action: 'Behavioral/doctrinal tokenomics vice — not statically falsifiable in
      a generic way. Documented in the Golden Standard catalogs as governance knowledge;
