- id: VT-111
  title: Deferred Without Registration (Diferido Sin Registro)
  symptom: El agente detecta deuda técnica o un hallazgo, lo clasifica verbalmente
    como "posponer / sprint aislado / deferred / luego", y cierra la respuesta sin
    abrir `PLAN.md`. El ítem desaparece.
  cause: Cambio de contexto entre modo análisis y modo implementación desactiva el
    trigger de VC-114; el agente asume que "nombrar = registrar".
  solution: 'Trigger B8 obligatorio: toda clasificación de "diferido" activa apertura
    inmediata de PLAN.md con ID + evidencia + done-criteria en esa misma respuesta.
    Sin ID en PLAN.md = olvidado, no diferido. (Lección: La omisión de registro formal
    de exclusiones estructurales o deudas técnicas en el plan de remediación centralizado
    conduce a una deriva persistente y a la pérdida del control de calidad).'
