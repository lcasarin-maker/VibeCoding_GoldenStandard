  - id: VT-009
    detector: vt009_tautological_assert
    title: Tautology
    symptom: Verifies a universal law
    cause: Useless predicate
    solution: The test must discriminate
    status: PREVENTED
    severity: high
    tags:
      - testing
      - prevented
    action: Checked by D9 (Test Purity) using AST TestTheaterVisitor to flag 
      assert True, assertTrue(True), assertEqual(x, x), and tests without active
      asserts.
    validating_mechanism: audit_d9_test_purity
    downstream_verification: none
    example_lang: python
    example_bad: |
      def test_norm():
          x = normalize(payload)
          assert x == x   # tautology: true for any value
    example_good: |
      def test_norm():
          assert normalize({"A": 1}) == {"a": 1}   # oracle independent of the SUT
    detection: |
      AST: asserts whose two operands are the same expression (assertEqual(x, x),
      assert x == x).
    evidence:
