format_version: 3.0
catalog_name: testing_vices
items:
- id: VT-001
  title: Hardcoded return
  symptom: Returns the expected value
  cause: Optimization against the example
  solution: Test general properties
  status: PREVENTED
  severity: high
  tags:
  - testing
  - prevented
  action: 'A test must assert general properties, not a single hardcoded return value that the implementation can trivially
    satisfy.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: "# The function returns a constant to 'pass' the test; it implements nothing.\ndef total(cart):\n    return\
    \ 42          # hardcoded so the test goes green\n\ndef test_total():\n    assert total(demo_cart) == 42\n"
  example_good: "# The test fixes the real expected result; the function must compute it.\ndef total(cart):\n    return sum(i.price\
    \ for i in cart.items)\n\ndef test_total():\n    assert total(Cart([Item(10), Item(32)])) == 42\n"
  detection: 'AST: function under test whose body is a single return of a constant literal, with a

    test that asserts exactly that literal.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, or over-mocked)
      in a measurable way.
  tier: core
- id: VT-002
  title: Permanent stub
  symptom: A fake body passes
  cause: Missing implementation
  solution: Block active stubs
  status: PREVENTED
  severity: high
  tags:
  - testing
  - prevented
  action: 'A placeholder body on an active path is not an implementation: completeness analysis rejects fake bodies that pass
    without doing the work.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: "# Permanent stub shipped to production as if it were implemented.\ndef charge(amount):\n    pass   # TODO:\
    \ implement (6 months and counting)\n"
  example_good: "# Real implementation; if not ready, it fails loudly, not silently.\ndef charge(amount):\n    raise NotImplementedError(\"\
    charge() pending - do not use in prod\")\n"
  detection: 'AST: functions whose body is only ''pass''/''...''/docstring (stub) that are not

    marked as abstract nor raise NotImplementedError.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, or over-mocked)
      in a measurable way.
  tier: core
- id: VT-003
  title: Response by exact datum
  symptom: Only passes the test's input
  cause: Memorization
  solution: Vary the inputs
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'A test must generalize beyond the one input it was written for; an assertion that only holds for a single hardcoded
    datum proves nothing.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: 'def classify(s): return "spam" if s == "BUY NOW" else "ham"  # only the test''s input

    '
  example_good: 'def classify(s): return model.predict(s)   # generalizes; the test uses several inputs

    '
  detection: 'Implementation that only succeeds for the test''s exact input (memorizes the case).

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: extended
- id: VT-004
  title: Copying the expected value
  symptom: The expected value ends up copied inside the code or the fixture and stops being an independent observation
  cause: The oracle is embedded in the implementation or in a shared fixture
  solution: Keep the expected value out of the production path and validate against an external specification
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'The expected value must come from an independent specification, not be copied into the production path or fixture
    where it stops being an independent observation.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: 'EXPECTED = compute(x)

    assert compute(x) == EXPECTED   # the expected value comes from the SUT itself

    '
  example_good: 'assert compute(x) == spec_value(x)   # expected value from an external specification

    '
  detection: 'The expected value is derived from the SUT itself instead of an independent source.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: extended
- id: VT-005
  detector: vt005_assert_true
  title: Trivial assert
  symptom: Always true
  cause: Tautology
  solution: Require a demonstrable failure
  status: PREVENTED
  severity: high
  tags:
  - testing
  - prevented
  action: 'An assertion must be able to fail: a check that is always true is rejected as non-discriminating.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: "def test_login():\n    user = login(\"a\", \"b\")\n    assert True    # trivial assert: always passes, does\
    \ not verify the login\n"
  example_good: "def test_login():\n    user = login(\"a\", \"b\")\n    assert user.is_authenticated and user.name == \"a\"\
    \n"
  detection: 'AST TestTheaterVisitor: presence of ''assert True'' / ''assertTrue(True)'' as the test''s

    only assertion.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, or over-mocked)
      in a measurable way.
  tier: core
- id: VT-006
  detector: vt006_test_without_assert
  title: Test without assert
  symptom: Runs without verifying
  cause: Missing oracle
  solution: Mandatory assertion
  status: PREVENTED
  severity: high
  tags:
  - testing
  - prevented
  action: 'A test that runs without any assertion verifies nothing; at least one discriminating assertion is mandatory.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: "# The agent generates a test that runs the code but verifies nothing.\n# Always passes (even if discount()\
    \ returns garbage) -> security theater.\ndef test_apply_discount():\n    cart = Cart(items=[Item(price=100)])\n    cart.apply_discount(0.1)\n\
    \    # no assert: the method runs and the test \"passes\"\n"
  example_good: "# The test fixes an explicit oracle on the observable result.\ndef test_apply_discount():\n    cart = Cart(items=[Item(price=100)])\n\
    \    cart.apply_discount(0.1)\n    assert cart.total() == 90  # behavior, not mere execution\n"
  detection: 'AST: flag `test_*` functions whose body contains no active `assert`, or

    whose asserts are tautological (`assert True`, `assertEqual(x, x)`). A test without

    an oracle cannot fail on a regression.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: coding agents generate tests without assertions and without invoking the focal method at a measurable frequency;
      excessive mocking aggravates the problem.
  tier: core
- id: VT-007
  title: Presence not correctness
  symptom: The file exists
  cause: Weak proxy
  solution: Validate the effect
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'Asserting that a file or artifact merely exists is not a test; validate its effect or content.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: 'assert os.path.exists("out.csv")   # exists, but the content is not validated

    '
  example_good: 'assert read_csv("out.csv").rows == 3   # observable effect

    '
  detection: 'Tests that assert the existence of an artifact without validating its effect/content.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: extended
- id: VT-008
  title: Message not result
  symptom: Looks for approval text
  cause: Indirect signal
  solution: Validate the final state
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'Validate the final state, not the presence of an approval message; matching success text is not verifying the outcome.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: 'assert "approved" in output   # looks for the approval text

    '
  example_good: 'assert order.status == Status.APPROVED   # structured final state

    '
  detection: 'Asserting on approval text instead of the structured final state.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: extended
- id: VT-009
  detector: vt009_tautological_assert
  title: Tautology
  symptom: Verifies a universal law
  cause: Useless predicate
  solution: The test must discriminate
  status: PREVENTED
  severity: high
  tags:
  - testing
  - prevented
  action: 'A test must discriminate the subject''s behavior, not restate a universal truth that holds regardless of the code.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: "def test_norm():\n    x = normalize(payload)\n    assert x == x   # tautology: true for any value\n"
  example_good: "def test_norm():\n    assert normalize({\"A\": 1}) == {\"a\": 1}   # oracle independent of the SUT\n"
  detection: 'AST: asserts whose two operands are the same expression (assertEqual(x, x),

    assert x == x).

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, or over-mocked)
      in a measurable way.
  tier: core
- id: VT-010
  title: Implementation test
  symptom: Internals change, it still passes
  cause: Incorrect coupling
  solution: Test behavior
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'Test observable behavior, not internal implementation detail, so a behavior-preserving refactor keeps the test
    meaningful.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: 'assert obj._helper.call_count == 1   # couples to internal detail

    '
  example_good: 'assert obj.result() == 42   # observable behavior

    '
  detection: 'Tests that assert on internal details (private calls) instead of behavior.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: extended
- id: VT-011
  title: Incorrect expected value
  symptom: The test compares against an expectation that no longer matches the current specification
  cause: The specification or the reference fixture became stale
  solution: Review the source of truth for the expectation and update the oracle
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'The expected value (oracle) must track the current specification; an assertion compared against a stale expectation
    is invalid.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: 'assert tax(100) == 7   # the spec changed to 8%, the test is still at 7

    '
  example_good: 'assert tax(100) == SPEC.rate * 100

    '
  detection: 'Oracle that no longer matches the current specification.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: extended
- id: VT-012
  title: Coverage without asserts
  symptom: Runs without verifying
  cause: Empty metric
  solution: Coverage with oracles
  status: PREVENTED
  severity: high
  tags:
  - testing
  - prevented
  action: 'Coverage means executed-and-verified: lines run without an oracle assertion do not constitute coverage.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: "# Calls everything to raise coverage, but asserts nothing.\ndef test_pipeline():\n    run_stage_a(); run_stage_b();\
    \ run_stage_c()   # 100% lines, 0% verification\n"
  example_good: "def test_pipeline():\n    out = run_stage_c(run_stage_b(run_stage_a(seed)))\n    assert out.status == \"\
    done\" and out.rows == 3\n"
  detection: 'Cross coverage with assert density: files with high coverage and tests without

    active asserts = inflated coverage.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, or over-mocked)
      in a measurable way.
  tier: core
- id: VT-013
  title: Tests for percentage
  symptom: Gamified coverage
  cause: Wrong incentive
  solution: Assertion quality
  status: PREVENTED
  severity: high
  tags:
  - testing
  - prevented
  action: 'Coverage percentage is not a goal; what matters is the discriminating quality of the assertions, not a gamed number.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: '# Empty tests created only to reach the % coverage threshold.

    def test_a(): import mod          # ''covers'' the import

    def test_b(): mod.helper()        # calls without verifying

    '
  example_good: "# The goal is verified behavior, not the coverage number.\ndef test_helper_doubles():\n    assert mod.helper(2)\
    \ == 4\n"
  detection: 'Detect tests whose declared purpose/commit is ''raise coverage'' and whose body

    lacks asserts on results.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, or over-mocked)
      in a measurable way.
  tier: extended
- id: VT-014
  title: Circular test
  symptom: The auditor approves itself
  cause: Non-independent verifier
  solution: External oracle
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'A test must be judged against an external oracle, never approve itself in a circular loop.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: 'assert auditor.audit(auditor) == "ok"   # evaluates itself

    '
  example_good: 'assert auditor.audit(subject) == expected_from_spec

    '
  detection: 'The subject under test is also its own oracle (self-approval).

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: core
- id: VT-015
  title: Test too broad
  symptom: Does not localize the failure
  cause: Low granularity
  solution: Focal tests
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'A test should localize the failure it detects; an over-broad test that cannot point to the cause has little diagnostic
    value.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: 'def test_everything(): assert run_whole_app() == "ok"   # does not localize the failure

    '
  example_good: '# focal tests per unit: test_parse, test_validate, test_render

    '
  detection: 'A monolithic test that covers the whole pipeline and does not localize the failure to a unit.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: extended
- id: VT-016
  title: Ceremonial textual assertion
  symptom: The text exists
  cause: Presence by action
  solution: Invoke the mandate
  status: PREVENTED
  severity: high
  tags:
  - testing
  - prevented
  action: 'Invoke the real behavior the mandate requires; asserting that some text exists is ceremony.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: "# Weak textual assertion: passes with almost any output.\ndef test_report():\n    r = build_report()\n   \
    \ assert \"ok\" in str(r).lower()   # theatrical\n"
  example_good: "def test_report():\n    r = build_report()\n    assert r.total == 100 and r.errors == []\n"
  detection: 'Flag asserts that only check vague substrings (''ok'',''success'',''done'') over

    str(result) instead of structured fields.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, or over-mocked)
      in a measurable way.
  tier: extended
- id: VT-017
  title: Hardcoded evidence
  symptom: outcome always success
  cause: Predetermined result
  solution: Outcome derived from verification
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'The recorded outcome must be derived from an actual verification, not a hardcoded success.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: 'def run(): return {"outcome": "success"}   # constant

    '
  example_good: 'def run(): return {"outcome": verify().status}

    '
  detection: 'Constant outcome/verdict instead of derived from verification.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: extended
- id: VT-018
  title: Fragile string matching
  symptom: The message changes the result
  cause: Fragile textual contract
  solution: Structured states
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'Validate structured state, not free-text messages whose wording can silently flip the result.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: 'assert str(err) == "Error: code 42 at line 7"   # breaks if the text changes

    '
  example_good: 'assert err.code == 42

    '
  detection: 'Comparison against exact text messages instead of structured states.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: extended
- id: VT-019
  title: Valid error hash
  symptom: UNREADABLE looks like data
  cause: Error encoded as a value
  solution: Explicit failure
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'An error must surface as an explicit failure, not be encoded into data that looks valid.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: 'data = read()

    assert data   # data == "UNREADABLE" passes as truthy

    '
  example_good: 'data = read()

    assert data not in SENTINELS   # explicit failure on error

    '
  detection: 'Error sentinels (UNREADABLE/ERROR/N/A) treated as valid data.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: extended
- id: VT-020
  title: One hundred percent as the goal
  symptom: Tests are gamed
  cause: Inverted incentive
  solution: One hundred percent only as a consequence
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'One hundred percent coverage is a consequence of good tests, never the goal; treating it as the target invites
    gaming.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: '# empty tests added only to reach 100% coverage

    '
  example_good: '# 100% is a consequence of covering behavior, not the goal

    '
  detection: 'Creating tests to reach 100% coverage as a goal in itself.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: extended
- id: VT-021
  title: Regression without a sentinel
  symptom: An old error reappears
  cause: Failure memory not turned into a test
  solution: Every fixed defect leaves a discriminating test
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'Every fixed defect must leave behind a discriminating regression test so the same error cannot silently reappear.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: '# BUG-9 is fixed but no test is left to discriminate it

    '
  example_good: 'def test_bug9(): assert safe_divide(1, 0) is None   # regression sentinel

    '
  detection: 'Defect fixed without a discriminating test that prevents its reappearance.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: extended
- id: VT-022
  title: Green ceremony and Tautological Assertions
  symptom: Useless passing tests that do not discriminate logical breaks
  cause: Coverage gamification prioritizing a syntactic metric over rigor
  solution: Require boundary-value assertions and prohibit global catches that silence failures
  status: PREVENTED
  severity: high
  tags:
  - testing
  - prevented
  action: 'Require boundary-value assertions and forbid broad catches that silence failures, so a green run cannot be ceremonial.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: "# Guaranteed 'green': a combination of tautological asserts.\ndef test_calc():\n    assert 1 == 1\n    assert\
    \ isinstance(calc(2), int)   # does not fix the value\n"
  example_good: "def test_calc():\n    assert calc(2) == 4\n"
  detection: 'AST: tests whose asserts are all tautological or type-based (isinstance) without fixing

    any concrete expected value.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, or over-mocked)
      in a measurable way.
  tier: extended
- id: VT-023
  title: Complacent mock
  symptom: Simulates success
  cause: Reality substituted
  solution: Calibrate with integration
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'A mock that always simulates success must be calibrated against a real integration, or it only tests itself.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: 'api = Mock(); api.charge.return_value = True   # never fails

    '
  example_good: '# contract test against real behavior, including its failures

    '
  detection: 'Mock that always returns success, without calibrating against real integration.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: extended
- id: VT-024
  title: Incomplete fake
  symptom: Omits hard cases
  cause: Partial model
  solution: Test against the real system
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'A fake that omits the hard cases gives false assurance; exercise the real system for those paths.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: "class FakeDB:\n    def get(self, k): return {\"a\": 1}[k]   # only the easy case\n"
  example_good: '# fake that respects the same invariants and errors as the real one

    '
  detection: 'Fake/double that omits hard cases (errors, limits) of the real system.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: extended
- id: VT-025
  title: Network stub
  symptom: Stale response
  cause: Frozen environment
  solution: Live contract tests
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'A network stub drifts from reality; pin behavior with a live contract test.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: 'requests_mock.get(url, json=OLD_SNAPSHOT)   # stale recorded response

    '
  example_good: '# live contract test against the provider''s current schema

    '
  detection: 'Network stub with a stale recorded response without a current contract test.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: extended
- id: VT-026
  title: Simplified database
  symptom: Rules differ
  cause: Different semantics
  solution: Test an equivalent engine
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: 'Test against an engine equivalent to production; a simplified database whose rules differ hides real failures.

    '
  validating_mechanism: static-ast
  downstream_verification: none
  example_lang: python
  example_bad: '# sqlite in test, postgres in prod -> constraints differ

    '
  example_good: '# test against an engine equivalent to production''s

    '
  detection: 'Test database with rules/constraints different from production.

    '
  evidence:
  - source: arxiv:2602.00409
    claim: an empirical study confirms that agents generate tests without an oracle (no assert, tautological, over-mocked)
      in a measurable way.
  tier: extended
- id: VT-027
