- id: VT-004
  title: Copiar esperado
  symptom: El valor esperado termina copiado dentro del código o del fixture y deja
    de ser una observación independiente
  cause: El oráculo se incrusta en la implementación o en una fixture compartida
  solution: Mantener el esperado fuera de la ruta productiva y validar contra una
    especificación externa
  status: AUDITED
  severity: medium
  tags:
  - testing
  - audited
  action: Audited as oracle-contamination in test fixtures or implementation glue;
    separate from stale-spec mismatches.
  validating_mechanism: audit_d8_test_coverage
  downstream_verification: none
  example_lang: python
  example_bad: |
    EXPECTED = compute(x)
    assert compute(x) == EXPECTED   # el esperado sale del propio SUT
  example_good: |
    assert compute(x) == spec_value(x)   # esperado de una especificacion externa
  detection: |
    El valor esperado se deriva del propio SUT en vez de una fuente independiente.
  evidence:
  - source: "arxiv:2602.00409"
    claim: "estudio empirico confirma que los agentes generan tests sin oraculo (sin assert, tautologicos, sobre-mockeados) de forma medible."
- id: VT-005
  title: Assert trivial
  symptom: Siempre verdadero
  cause: Tautología
  solution: Exigir fallo demostrable
  status: PREVENTED
  severity: high
  tags:
  - testing
  - prevented
  action: Checked by D9 (Test Purity) using AST TestTheaterVisitor to flag assert
    True, assertTrue(True), assertEqual(x, x), and tests without active asserts.
  validating_mechanism: audit_d9_test_purity
  downstream_verification: none
  example_lang: python
  example_bad: |
    def test_login():
        user = login("a", "b")
        assert True    # assert trivial: pasa siempre, no verifica el login
  example_good: |
    def test_login():
        user = login("a", "b")
        assert user.is_authenticated and user.name == "a"
  detection: |
    AST TestTheaterVisitor: presencia de 'assert True' / 'assertTrue(True)' como unica
    asercion del test.
  evidence:
  - source: "arxiv:2602.00409"
    claim: "estudio empirico confirma que los agentes generan tests sin oraculo (sin assert, tautologicos o sobre-mockeados) de forma medible."
- id: VT-006
  title: Test sin assert
  symptom: Corre sin verificar
  cause: Oráculo ausente
  solution: Aserción obligatoria
  status: PREVENTED
  severity: high
  tags:
  - testing
  - prevented
  action: Checked by D9 (Test Purity) using AST TestTheaterVisitor to flag assert
    True, assertTrue(True), assertEqual(x, x), and tests without active asserts.
  validating_mechanism: audit_d9_test_purity
  downstream_verification: none
  example_lang: python
  example_bad: |
    # El agente genera un test que ejecuta el código pero no verifica nada.
    # Pasa siempre (incluso si discount() devuelve basura) -> teatro de seguridad.
    def test_apply_discount():
        cart = Cart(items=[Item(price=100)])
        cart.apply_discount(0.1)
        # sin assert: el método se ejecuta y el test "pasa"
  example_good: |
    # El test fija un oráculo explícito sobre el resultado observable.
    def test_apply_discount():
        cart = Cart(items=[Item(price=100)])
        cart.apply_discount(0.1)
        assert cart.total() == 90  # comportamiento, no mera ejecución
  detection: |
    AST: marcar funciones `test_*` cuyo cuerpo no contenga ningún `assert` activo, o
    cuyos asserts sean tautológicos (`assert True`, `assertEqual(x, x)`). Un test sin
    oráculo no puede fallar ante una regresión.
  evidence:
  - source: "arxiv:2602.00409"
    claim: "los agentes de codificación generan tests sin aserciones y sin invocación del método focal con frecuencia medible; el exceso de mocking agrava el problema."
