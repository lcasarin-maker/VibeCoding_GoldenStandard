- id: VT-109
  title: Teatro de Frameworks e Intermediarios Redundantes (Testing Bridge Theater)
  symptom: Usar frameworks de prueba complejos (`pytest`) para validaciones estáticas/estructurales
    simples que pueden resolverse con un script directo e independiente. Añade dependencias,
    duplicidad y crea puentes de compatibilidad que violan los principios de simplicidad
    y acoplamiento mínimo (KISS).
  cause: Inercia técnica de usar herramientas tradicionales de desarrollo en lugar
    de unificar la autoridad en un auditor directo y soberano.
  solution: Eliminar el puente intermediario; el auditor estático se ejecuta de forma
    directa y nativa (`exit 0` o `exit 1`).
  status: PREVENTED
  severity: high
  tags:
  - testing
  - prevented
  action: Testing Bridge Theater is bypassed; static audits and tests run as direct
    shell pipelines returning native exit codes.
  validating_mechanism: test_infrastructure_checks
  downstream_verification: none
  example_lang: python
  example_bad: |
    # Teatro de frameworks: capas de mocks que prueban el mock, no el sistema.
    def test_service():
        svc = Mock()
        svc.process.return_value = "ok"
        assert svc.process() == "ok"   # se afirma sobre el mock mismo
  example_good: |
    def test_service():
        svc = RealService(repo=InMemoryRepo())
        assert svc.process(order).state == "ok"   # sistema real
  detection: |
    Detectar tests donde el objeto afirmado es un Mock configurado en el propio test
    (assert sobre return_value preprogramado).
  evidence:
  - source: "arxiv:2602.00409"
    claim: "estudio empirico confirma que los agentes generan tests sin oraculo (sin assert, tautologicos o sobre-mockeados) de forma medible."
