  - id: VT-115
    title: False Drift Positive from Line Endings (CRLF/LF Hash Mismatch)
    symptom: The drift audit (D12) fails falsely when comparing files that are
      identical on disk (Windows CRLF) against Git repositories or satellites
      (LF).
    cause: Direct binary comparison of SHA256 hashes without prior normalization
      of line-ending characters, ignoring Git's automatic translation
      policies (`core.autocrlf`).
    solution: Mandatorily normalize every binary byte stream by decoding it
      and converting the `\r\n` line-ending sequence to `\n` before computing
      the integrity- or drift-verification hash.
    status: REMEDIATED
    severity: high
    tags:
      - testing
      - remediated
    action: Checked by setup_validate.py which runs comprehensive pre-flight 
      verification of Python, git hooks, write access, encoding, and the project
      registry.
    validating_mechanism: test_setup_validation
    downstream_verification: none
    example_lang: python
    example_bad: |
      # False 'drift' positive: compares raw bytes and CRLF/LF triggers a difference.
      def test_no_drift():
          assert open("a.txt","rb").read() == open("b.txt","rb").read()
    example_good: |
      # Normalize line endings before comparing logical content.
      def test_no_drift():
          norm = lambda p: open(p, encoding="utf-8").read().replace("\r\n", "\n")
          assert norm("a.txt") == norm("b.txt")
    detection: |
      Byte-by-byte file comparisons that do not normalize EOL (CRLF vs LF) and produce
      false drift in mixed Windows/Unix environments.
    evidence:
      - source: "arxiv:2602.00409"
        claim: "an empirical study confirms that agents generate tests without an oracle
          (no assert, tautological, or over-mocked) in a measurable way."
    tier: extended
  - id: VT-116
    title: Decoy comment satisfies a text-based validator
    symptom: A coverage or traceability check reports a symbol as physically present
      when only a commented-out or string-literal mention of it exists; no real
      function or class backs it.
    cause: The validator resolves a symbol by scanning raw source text (a substring
      or regex such as `"def <name>" in source`), which also matches inside comments
      and string literals. A planted `# def <name>` line games the check, deceiving
      the judge with text that no code backs.
    solution: Resolve symbols structurally through the AST so that only a real
      FunctionDef or ClassDef node counts. A comment or string literal can no longer
      satisfy the validator.
    status: PREVENTED
    severity: high
    tags:
      - testing
      - prevented
    action: Symbol resolution is AST-based, so a planted `# def <name>` comment does
      not resolve; an additional scanner flags any decoy comment that mirrors a
      declared validating mechanism.
    validating_mechanism: test_planted_def_comment_does_not_resolve
    downstream_verification: none
    example_lang: python
    example_bad: |
      # Validator: a symbol is "covered" if the text "def X" appears in the file.
      # def audit_widget_safety   <- planted decoy; no real function exists
      assert "def audit_widget_safety" in source  # passes on the comment alone
    example_good: |
      import ast
      tree = ast.parse(source)
      covered = any(
          isinstance(n, (ast.FunctionDef, ast.ClassDef)) and n.name == "audit_widget_safety"
          for n in ast.walk(tree)
      )  # a comment or string literal can never satisfy this
    detection: |
      Coverage or traceability validators that confirm a symbol's existence with a
      raw-text substring or regex over source (matching inside comments and string
      literals), plus commented-out `def`/`class` lines that mirror a declared
      validating mechanism.
    tier: extended
