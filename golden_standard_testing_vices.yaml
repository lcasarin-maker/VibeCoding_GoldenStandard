  - id: VT-111
    title: Deferred Without Registration
    symptom: The agent detects technical debt or a finding, verbally classifies
      it as "postpone / isolated sprint / deferred / later", and closes the
      response without opening `PLAN.md`. The item disappears.
    cause: A context switch between analysis mode and implementation mode
      disables the VC-114 trigger; the agent assumes that "naming = registering".
    solution: 'Mandatory B8 trigger: every "deferred" classification triggers immediate
      opening of PLAN.md with ID + evidence + done-criteria in that same response.
      No ID in PLAN.md = forgotten, not deferred. (Lesson: omitting the formal
      registration of structural exclusions or technical debt in the centralized
      remediation plan leads to persistent drift and loss of quality
      control).'
