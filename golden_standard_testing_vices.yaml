- id: VT-115
  title: Falso Positivo de Drift por Fin de Línea (CRLF/LF Hash Mismatch)
  symptom: La auditoría de drift (D12) falla falsamente al comparar archivos idénticos
    en disco (Windows CRLF) contra repositorios Git o satélites (LF).
  cause: Comparación binaria directa de hashes SHA256 sin normalización previa de
    caracteres de fin de línea, ignorando las políticas de traducción automática de
    Git (`core.autocrlf`).
  solution: Normalizar obligatoriamente todo byte stream binario decodificándolo y
    convirtiendo la secuencia de fin de línea `\r\n` a `\n` antes de calcular el hash
    de verificación de integridad o drift.
  status: REMEDIATED
  severity: high
  tags:
  - testing
  - remediated
  action: Checked by setup_validate.py which runs comprehensive pre-flight verification
    of Python, git hooks, write access, encoding, and the project registry.
  validating_mechanism: test_setup_validation
  downstream_verification: none
