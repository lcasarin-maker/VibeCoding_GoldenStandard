format_version: 3.0
catalog_name: testing_vices
items:
  - id: VT-001
    title: Hardcoded return
    symptom: Returns the expected value
    cause: Optimization against the example
    solution: Test general properties
    status: PREVENTED
    severity: high
    tags:
      - testing
      - prevented
    action: Prevented by D7 (Completeness) and D8 (Test Coverage) in 
      run_security_audit_12d.py using AST analysis of function bodies to reject 
      empty stubs or stub docstrings.
    validating_mechanism: audit_d2_completeness
    downstream_verification: none
    example_lang: python
    example_bad: |
      # The function returns a constant to 'pass' the test; it implements nothing.
      def total(cart):
          return 42          # hardcoded so the test goes green

      def test_total():
          assert total(demo_cart) == 42
    example_good: |
      # The test fixes the real expected result; the function must compute it.
      def total(cart):
          return sum(i.price for i in cart.items)

      def test_total():
          assert total(Cart([Item(10), Item(32)])) == 42
    detection: |
      AST: function under test whose body is a single return of a constant literal, with a
      test that asserts exactly that literal.
    evidence:
      - source: "arxiv:2602.00409"
        claim: "an empirical study confirms that agents generate tests without an oracle
          (no assert, tautological, or over-mocked) in a measurable way."
    tier: core
  - id: VT-002
    title: Permanent stub
    symptom: A fake body passes
    cause: Missing implementation
    solution: Block active stubs
    status: PREVENTED
    severity: high
    tags:
      - testing
      - prevented
    action: Prevented by D7 (Completeness) and D8 (Test Coverage) in 
      run_security_audit_12d.py using AST analysis of function bodies to reject 
      empty stubs or stub docstrings.
    validating_mechanism: audit_d2_completeness
    downstream_verification: none
    example_lang: python
    example_bad: |
      # Permanent stub shipped to production as if it were implemented.
      def charge(amount):
          pass   # TODO: implement (6 months and counting)
    example_good: |
      # Real implementation; if not ready, it fails loudly, not silently.
      def charge(amount):
          raise NotImplementedError("charge() pending - do not use in prod")
    detection: |
      AST: functions whose body is only 'pass'/'...'/docstring (stub) that are not
      marked as abstract nor raise NotImplementedError.
    evidence:
      - source: "arxiv:2602.00409"
        claim: "an empirical study confirms that agents generate tests without an oracle
          (no assert, tautological, or over-mocked) in a measurable way."
    tier: core
  - id: VT-003
    title: Response by exact datum
    symptom: Only passes the test's input
    cause: Memorization
    solution: Vary the inputs
    status: AUDITED
    severity: medium
    tags:
      - testing
      - audited
    action: Audited by DeepForensicAuditor D8 and D9 behavioral and static test 
      validations.
    validating_mechanism: audit_d8_test_coverage
    downstream_verification: none
    example_lang: python
    example_bad: |
      def classify(s): return "spam" if s == "BUY NOW" else "ham"  # only the test's input
    example_good: |
      def classify(s): return model.predict(s)   # generalizes; the test uses several inputs
    detection: |
      Implementation that only succeeds for the test's exact input (memorizes the case).
    evidence:
      - source: "arxiv:2602.00409"
        claim: "an empirical study confirms that agents generate tests without an oracle
          (no assert, tautological, over-mocked) in a measurable way."
    tier: extended
  - id: VT-004
    title: Copying the expected value
    symptom: The expected value ends up copied inside the code or the fixture and
      stops being an independent observation
    cause: The oracle is embedded in the implementation or in a shared
      fixture
    solution: Keep the expected value out of the production path and validate against
      an external specification
    status: AUDITED
    severity: medium
    tags:
      - testing
      - audited
    action: Audited as oracle-contamination in test fixtures or implementation 
      glue; separate from stale-spec mismatches.
    validating_mechanism: audit_d8_test_coverage
    downstream_verification: none
    example_lang: python
    example_bad: |
      EXPECTED = compute(x)
      assert compute(x) == EXPECTED   # the expected value comes from the SUT itself
    example_good: |
      assert compute(x) == spec_value(x)   # expected value from an external specification
    detection: |
      The expected value is derived from the SUT itself instead of an independent source.
    evidence:
      - source: "arxiv:2602.00409"
        claim: "an empirical study confirms that agents generate tests without an oracle
          (no assert, tautological, over-mocked) in a measurable way."
    tier: extended
  - id: VT-005
    detector: vt005_assert_true
    title: Trivial assert
    symptom: Always true
    cause: Tautology
    solution: Require a demonstrable failure
    status: PREVENTED
    severity: high
    tags:
      - testing
      - prevented
    action: Checked by D9 (Test Purity) using AST TestTheaterVisitor to flag 
      assert True, assertTrue(True), assertEqual(x, x), and tests without active
      asserts.
    validating_mechanism: audit_d9_test_purity
    downstream_verification: none
    example_lang: python
    example_bad: |
      def test_login():
          user = login("a", "b")
          assert True    # trivial assert: always passes, does not verify the login
    example_good: |
      def test_login():
          user = login("a", "b")
          assert user.is_authenticated and user.name == "a"
    detection: |
      AST TestTheaterVisitor: presence of 'assert True' / 'assertTrue(True)' as the test's
      only assertion.
    evidence:
      - source: "arxiv:2602.00409"
        claim: "an empirical study confirms that agents generate tests without an oracle
          (no assert, tautological, or over-mocked) in a measurable way."
    tier: core
  - id: VT-006
    detector: vt006_test_without_assert
    title: Test without assert
    symptom: Runs without verifying
    cause: Missing oracle
    solution: Mandatory assertion
    status: PREVENTED
    severity: high
    tags:
      - testing
      - prevented
    action: Checked by D9 (Test Purity) using AST TestTheaterVisitor to flag 
      assert True, assertTrue(True), assertEqual(x, x), and tests without active
      asserts.
    validating_mechanism: audit_d9_test_purity
    downstream_verification: none
    example_lang: python
    example_bad: |
      # The agent generates a test that runs the code but verifies nothing.
      # Always passes (even if discount() returns garbage) -> security theater.
      def test_apply_discount():
          cart = Cart(items=[Item(price=100)])
          cart.apply_discount(0.1)
          # no assert: the method runs and the test "passes"
    example_good: |
      # The test fixes an explicit oracle on the observable result.
      def test_apply_discount():
          cart = Cart(items=[Item(price=100)])
          cart.apply_discount(0.1)
          assert cart.total() == 90  # behavior, not mere execution
    detection: |
      AST: flag `test_*` functions whose body contains no active `assert`, or
      whose asserts are tautological (`assert True`, `assertEqual(x, x)`). A test without
      an oracle cannot fail on a regression.
    evidence:
      - source: "arxiv:2602.00409"
        claim: "coding agents generate tests without assertions and without invoking
          the focal method at a measurable frequency; excessive mocking aggravates the
          problem."
    tier: core
