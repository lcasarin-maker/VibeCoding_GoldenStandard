      compatibility bridges that violate the principles of simplicity and minimal
      coupling (KISS).
    cause: Technical inertia of using traditional development tools instead of
      unifying authority in a direct, sovereign auditor.
    solution: Remove the intermediary bridge; the static auditor runs directly
      and natively (`exit 0` or `exit 1`).
