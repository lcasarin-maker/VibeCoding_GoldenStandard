format_version: 3.0
catalog_name: testing_vices
items:
- id: VT-001
  title: Hardcoded return
  symptom: Devuelve valor esperado
  cause: Optimización contra ejemplo
  solution: Probar propiedades generales
  status: PREVENTED
  severity: high
  tags:
  - testing
  - prevented
  action: Prevented by D7 (Completeness) and D8 (Test Coverage) in run_security_audit_12d.py
    using AST analysis of function bodies to reject empty stubs or stub docstrings.
  validating_mechanism: audit_d2_completeness
  downstream_verification: none
  example_lang: python
  example_bad: |
    # La funcion devuelve una constante para 'pasar' el test; no implementa nada.
    def total(cart):
        return 42          # hardcoded para que el test verde

    def test_total():
        assert total(demo_cart) == 42
  example_good: |
    # El test fija el resultado esperado real; la funcion debe calcularlo.
    def total(cart):
        return sum(i.price for i in cart.items)

    def test_total():
        assert total(Cart([Item(10), Item(32)])) == 42
  detection: |
    AST: funcion bajo prueba cuyo cuerpo es un unico return de literal constante, con un
    test que afirma exactamente ese literal.
  evidence:
  - source: "arxiv:2602.00409"
    claim: "estudio empirico confirma que los agentes generan tests sin oraculo (sin assert, tautologicos o sobre-mockeados) de forma medible."
- id: VT-002
  title: Stub permanente
  symptom: Cuerpo falso pasa
  cause: Implementación ausente
  solution: Bloquear stubs activos
  status: PREVENTED
  severity: high
  tags:
  - testing
  - prevented
  action: Prevented by D7 (Completeness) and D8 (Test Coverage) in run_security_audit_12d.py
    using AST analysis of function bodies to reject empty stubs or stub docstrings.
  validating_mechanism: audit_d2_completeness
  downstream_verification: none
  example_lang: python
  example_bad: |
    # Stub permanente enviado a produccion como si estuviera implementado.
    def charge(amount):
        pass   # TODO: implementar (lleva 6 meses)
  example_good: |
    # Implementacion real; si no esta lista, falla ruidosamente, no en silencio.
    def charge(amount):
        raise NotImplementedError("charge() pendiente - no usar en prod")
  detection: |
    AST: funciones con cuerpo unicamente 'pass'/'...'/docstring (stub) que no estan
    marcadas como abstractas ni lanzan NotImplementedError.
  evidence:
  - source: "arxiv:2602.00409"
    claim: "estudio empirico confirma que los agentes generan tests sin oraculo (sin assert, tautologicos o sobre-mockeados) de forma medible."
- id: VT-003
  title: Respuesta por dato exacto
  symptom: Solo pasa input del test
  cause: Memorización
  solution: Variar entradas
