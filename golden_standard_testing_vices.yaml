- id: VT-009
  title: Tautología
  symptom: Verifica ley universal
  cause: Predicado inútil
  solution: Test debe discriminar
  status: PREVENTED
  severity: high
  tags:
  - testing
  - prevented
  action: Checked by D9 (Test Purity) using AST TestTheaterVisitor to flag assert
    True, assertTrue(True), assertEqual(x, x), and tests without active asserts.
  validating_mechanism: audit_d9_test_purity
  downstream_verification: none
  example_lang: python
  example_bad: |
    def test_norm():
        x = normalize(payload)
        assert x == x   # tautologia: cierto para cualquier valor
  example_good: |
    def test_norm():
        assert normalize({"A": 1}) == {"a": 1}   # oraculo independiente del SUT
  detection: |
    AST: asserts cuyos dos operandos son la misma expresion (assertEqual(x, x),
    assert x == x).
  evidence:
